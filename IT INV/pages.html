    generateQR: function (asset) {
      const qrDiv = document.getElementById('qrCodePreview');
      if (!qrDiv) return;

      google.script.run
        .withSuccessHandler(function (url) {
          const qrData = encodeURIComponent(url + '?id=' + asset.id);
          const img = document.createElement('img');
          img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + qrData + '&color=0-0-0';
          img.style.width = '180px';
          img.style.height = '180px';
          img.id = 'qrCodeImage';
          img.crossOrigin = 'anonymous';
          qrDiv.innerHTML = '';
          qrDiv.appendChild(img);
        })
        .withFailureHandler(function () {
          const qrData = encodeURIComponent(asset.id);
          const img = document.createElement('img');
          img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + qrData + '&color=0-0-0';
          img.style.width = '180px';
          img.style.height = '180px';
          img.id = 'qrCodeImage';
          img.crossOrigin = 'anonymous';
          qrDiv.innerHTML = '';
          qrDiv.appendChild(img);
        })
        .getWebAppUrl();
    },

    getWarrantyClass: function (dateStr) {
      if (!dateStr) return '';
      const exp = new Date(dateStr);
      const now = new Date();
      if (exp < now) return 'text-danger';
      if (exp < new Date(now.getTime() + 30 * 86400000)) return 'text-warning';
      return 'text-success';
    },

    uploadImages: function (event) {
      const files = event.target.files;
      this.processImageFiles(files);
    },

    handleDrop: function (event) {
      const files = event.dataTransfer.files;
      this.processImageFiles(files);
    },

    processImageFiles: function (files) {
      if (!files || files.length === 0) return;
      const assetId = this.currentAsset.id;
      let processed = 0;
      const total = files.length;

      App.showLoading(true);

      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        if (!file.type.startsWith('image/')) continue;

        const reader = new FileReader();
        reader.onload = function (e) {
          const base64 = e.target.result.split(',')[1];
          google.script.run
            .withSuccessHandler(function () {
              processed++;
              if (processed >= total) {
                App.showLoading(false);
                App.toast('อัพโหลดรูปสำเร็จ ' + total + ' รูป', 'success');
                AssetDetailPage.load(assetId);
              }
            })
            .withFailureHandler(function (err) {
              processed++;
              App.toast('อัพโหลดไม่สำเร็จ: ' + file.name, 'error');
              if (processed >= total) {
                App.showLoading(false);
                AssetDetailPage.load(assetId);
              }
            })
            .uploadAssetImage(assetId, base64, file.name, file.type);
        };
        reader.readAsDataURL(file);
      }
    },

    deleteImage: function (imageId) {
      showConfirm('ต้องการลบรูปภาพนี้?', function () {
        App.showLoading(true);
        google.script.run
          .withSuccessHandler(function () {
            App.showLoading(false);
            App.toast('ลบรูปเรียบร้อย', 'success');
            AssetDetailPage.load();
          })
          .withFailureHandler(function (err) {
            App.showLoading(false);
            App.toast('เกิดข้อผิดพลาด', 'error');
          })
          .deleteAssetImage(imageId);
      });
    },

    deleteSignature: function (sigId) {
      showConfirm('ต้องการลบลายเซ็นนี้?', function () {
        App.showLoading(true);
        google.script.run
          .withSuccessHandler(function () {
            App.showLoading(false);
            App.toast('ลบลายเซ็นเรียบร้อย', 'success');
            AssetDetailPage.load();
          })
          .withFailureHandler(function (err) {
            App.showLoading(false);
            App.toast('เกิดข้อผิดพลาด', 'error');
          })
          .deleteSignature(sigId);
      });
    },

    viewImage: function (url) {
      document.getElementById('viewerImage').src = url;
      openModal('imageViewerModal');
    },

    downloadQR: function () {
      const img = document.querySelector('#qrCodePreview img');
      if (!img) return;
      var asset = this.currentAsset;
      var canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth || 180;
      canvas.height = img.naturalHeight || 180;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      try {
        var link = document.createElement('a');
        link.download = 'QR_' + (asset.asset_code || asset.id) + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (e) {
        window.open(img.src, '_blank');
      }
    },

    printQR: function () {
      const img = document.querySelector('#qrCodePreview img');
      if (!img) return;
      const asset = this.currentAsset;
      const w = window.open('', '_blank');

      const printHtml = `
      <html>
        <head>
          <style>
            body { font-family: Prompt, sans-serif; padding: 20px; display: flex; justify-content: center; align-items: flex-start; }
            .qr-label { border: 1px solid #333; border-radius: 8px; padding: 16px; text-align: center; width: 220px; background: white; color: #333; break-inside: avoid; }
            .qr-img { width: 180px; height: 180px; margin: 0 auto; display: block; }
            .asset-name { font-weight: 600; font-size: 14px; margin-top: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            .asset-code { color: #555; font-size: 12px; margin-top: 4px; }
          </style>
        </head>
        <body>
          <div class="qr-label">
            <img class="qr-img" src="${img.src}">
            <div class="asset-name">${asset.name}</div>
            <div class="asset-code">${asset.asset_code || ''}</div>
          </div>
        </body>
      </html>
      `;

      w.document.write(printHtml);
      w.document.close();
      setTimeout(function () { w.print(); }, 500);
    },

    deleteThis: function () {
      const asset = this.currentAsset;
      showConfirm('ต้องการลบ "' + asset.name + '" ใช่หรือไม่?', function () {
        App.showLoading(true);
        google.script.run
          .withSuccessHandler(function () {
            App.showLoading(false);
            App.toast('ลบเรียบร้อย', 'success');
            App.navigate('assets');
          })
          .withFailureHandler(function (err) {
            App.showLoading(false);
            App.toast('เกิดข้อผิดพลาด', 'error');
          })
          .deleteAsset(asset.id);
      });
    }
  };
</script>
<script>
  /**
   * qrcode-page.html &#8212; QR Code Print Page
   */
  const QRCodePage = {
    selectedAssets: [],
    settings: {
      paperSize: 'A4',
      columns: 3,
      labelStyle: 'vertical', // vertical or horizontal
      darkLabel: false,
      showName: true,
      showCode: true,
      showSerial: true,
      showDept: true,
      showStatus: true,
      orgName: 'สำนักงาน',
      baseUrl: ''
    },

    load: function () {
      const container = document.getElementById('page-qrcode');
      container.innerHTML = this.getTemplate();

      // Load assets for selection
      google.script.run
        .withSuccessHandler(function (result) {
          QRCodePage.allAssets = result.data || [];
          QRCodePage.selectedAssets = App.selectedAssets.length > 0 ?
            QRCodePage.allAssets.filter(function (a) { return App.selectedAssets.indexOf(a.id) !== -1; }) :
            QRCodePage.allAssets.slice(0, 6);
          QRCodePage.renderAssetSelector();
          QRCodePage.renderPreview();
        })
        .withFailureHandler(function () { })
        .getAssets({ pageSize: 500 });

      // Load settings
      google.script.run
        .withSuccessHandler(function (s) {
          if (s.org_name) QRCodePage.settings.orgName = s.org_name;
          if (s.base_url) QRCodePage.settings.baseUrl = s.base_url;
          document.getElementById('qrOrgName').value = QRCodePage.settings.orgName;
          document.getElementById('qrBaseUrl').value = QRCodePage.settings.baseUrl;
        })
        .withFailureHandler(function () { })
        .getSettings();
    },

    getTemplate: function () {
      return `
      
      <div style="display:flex;gap:32px;align-items:center;margin-bottom:24px;background:var(--bg-card);padding:20px 24px;border-radius:var(--border-radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--border-color);flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="background:var(--primary-light);color:var(--primary);width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;"><i class="ph ph-check-square"></i></div>
          <div>
            <div style="font-size:20px;font-weight:700;color:var(--text-primary);line-height:1.2;" id="qrSelectedCount">0</div>
            <div class="text-xs text-muted fw-500">เลือกรายการ</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="background:var(--info-light);color:var(--info);width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;"><i class="ph ph-file"></i></div>
          <div>
            <div style="font-size:20px;font-weight:700;color:var(--text-primary);line-height:1.2;" id="qrPageCount">1</div>
            <div class="text-xs text-muted fw-500">หน้ากระดาษ</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="background:var(--success-light);color:var(--success);width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;"><i class="ph ph-tag"></i></div>
          <div>
            <div style="font-size:20px;font-weight:700;color:var(--text-primary);line-height:1.2;" id="qrLabelCount">0</div>
            <div class="text-xs text-muted fw-500">Label ทั้งหมด</div>
          </div>
        </div>
        <div style="flex:1"></div>
        <div class="btn-group" style="background:var(--bg-input);padding:4px;border-radius:12px;border:1px solid var(--border-color);">
          <button class="btn btn-outline btn-sm" style="border:none;border-radius:8px;padding:8px 16px;" onclick="QRCodePage.selectAssets()"><i class="ph ph-copy"></i> เลือกรายการ</button>
          <button class="btn btn-outline btn-sm" style="border:none;border-radius:8px;padding:8px 16px;" onclick="QRCodePage.downloadPDF()"><i class="ph ph-file-pdf"></i> PDF</button>
          <button class="btn btn-primary btn-sm" style="border-radius:8px;padding:8px 24px;box-shadow:var(--shadow-primary);" onclick="QRCodePage.print()"><i class="ph ph-printer"></i> พิมพ์ Label</button>
        </div>
      </div>

      <div style="display:grid; grid-template-columns: 280px 1fr; gap:20px">
        
        <div>
          <div class="card mb-2" style="border:none;box-shadow:var(--shadow);border-radius:var(--border-radius-lg);">
            <div class="card-header" style="background:transparent;padding:16px 20px;border-bottom:1px solid var(--border-color);">
              <h3 style="color:var(--primary-dark);display:flex;align-items:center;gap:8px;">
                <i class="ph ph-gear-six" style="font-size:20px;"></i> ตั้งค่าการพิมพ์
              </h3>
            </div>
            <div class="card-body" style="padding:20px;">
              
              <div class="form-group mb-3">
                <label class="fw-600 text-xs text-muted" style="text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:block;">ขนาดกระดาษ</label>
                <div style="display:flex;flex-direction:column;gap:6px;">
                  <button class="btn btn-primary btn-sm" id="paperA4" style="justify-content:flex-start;padding:10px 14px;border-radius:8px;" onclick="QRCodePage.setPaper('A4')">
                    <i class="ph ph-file-text"></i> A4 (210&#215;297mm)
                  </button>
                  <button class="btn btn-outline btn-sm" id="paperA5" style="justify-content:flex-start;padding:10px 14px;border-radius:8px;" onclick="QRCodePage.setPaper('A5')">
                    <i class="ph ph-file"></i> A5 (148&#215;210mm)
                  </button>
                  <button class="btn btn-outline btn-sm" id="paperStickerS" style="justify-content:flex-start;padding:10px 14px;border-radius:8px;" onclick="QRCodePage.setPaper('StickerS')">
                    <i class="ph ph-tag"></i> สติกเกอร์ S (50&#215;25mm)
                  </button>
                  <button class="btn btn-outline btn-sm" id="paperStickerL" style="justify-content:flex-start;padding:10px 14px;border-radius:8px;" onclick="QRCodePage.setPaper('StickerL')">
                    <i class="ph ph-tag"></i> สติกเกอร์ L (80&#215;50mm)
                  </button>
                </div>
              </div>

              <div class="form-group mb-3">
                <label class="fw-600 text-xs text-muted" style="text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:block;">จำนวนคอลัมน์</label>
                <div class="btn-group" style="width:100%;">
                  <button class="btn btn-outline btn-sm btn-col" id="colBtn2" style="flex:1;justify-content:center;border-radius:8px 0 0 8px;" onclick="QRCodePage.setColumns(2)">2</button>
                  <button class="btn btn-primary btn-sm btn-col" id="colBtn3" style="flex:1;justify-content:center;border-radius:0;" onclick="QRCodePage.setColumns(3)">3</button>
                  <button class="btn btn-outline btn-sm btn-col" id="colBtn4" style="flex:1;justify-content:center;border-radius:0 8px 8px 0;" onclick="QRCodePage.setColumns(4)">4</button>
                </div>
              </div>

              <div class="form-group">
                <label class="fw-600 text-xs text-muted" style="text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:block;">สไตล์ LABEL</label>
                <div class="btn-group" style="width:100%;">
                  <button class="btn btn-primary btn-sm btn-style" id="styleVertical" style="flex:1;justify-content:center;border-radius:8px 0 0 8px;" onclick="QRCodePage.setStyle('vertical')">
                    <i class="ph ph-columns"></i> แนวตั้ง
                  </button>
                  <button class="btn btn-outline btn-sm btn-style" id="styleHorizontal" style="flex:1;justify-content:center;border-radius:0 8px 8px 0;" onclick="QRCodePage.setStyle('horizontal')">
                    <i class="ph ph-rows"></i> แนวนอน
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="card mb-2" style="border:none;box-shadow:var(--shadow);border-radius:var(--border-radius-lg);">
            <div class="card-header" style="background:transparent;padding:16px 20px;border-bottom:1px solid var(--border-color);">
              <h3 style="color:var(--primary-dark);display:flex;align-items:center;gap:8px;">
                <i class="ph ph-list-checks" style="font-size:20px;"></i> ข้อมูลบน LABEL
              </h3>
            </div>
            <div class="card-body" style="padding:16px 20px;">
              <div style="display:flex;flex-direction:column;gap:12px">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <span class="text-sm fw-500">ชื่ออุปกรณ์</span>
                  <label class="toggle"><input type="checkbox" checked onchange="QRCodePage.settings.showName=this.checked; QRCodePage.renderPreview()"><span class="slider"></span></label>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <span class="text-sm fw-500">รหัสทรัพย์สิน</span>
                  <label class="toggle"><input type="checkbox" checked onchange="QRCodePage.settings.showCode=this.checked; QRCodePage.renderPreview()"><span class="slider"></span></label>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <span class="text-sm fw-500">Serial Number</span>
                  <label class="toggle"><input type="checkbox" checked onchange="QRCodePage.settings.showSerial=this.checked; QRCodePage.renderPreview()"><span class="slider"></span></label>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <span class="text-sm fw-500">แผนก</span>
                  <label class="toggle"><input type="checkbox" checked onchange="QRCodePage.settings.showDept=this.checked; QRCodePage.renderPreview()"><span class="slider"></span></label>
                </div>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                  <span class="text-sm fw-500">สถานะ</span>
                  <label class="toggle"><input type="checkbox" checked onchange="QRCodePage.settings.showStatus=this.checked; QRCodePage.renderPreview()"><span class="slider"></span></label>
                </div>
              </div>
            </div>
          </div>

          <div class="card" style="border:none;box-shadow:var(--shadow);border-radius:var(--border-radius-lg);">
            <div class="card-header" style="background:transparent;padding:16px 20px;border-bottom:1px solid var(--border-color);">
              <h3 style="color:var(--primary-dark);display:flex;align-items:center;gap:8px;">
                <i class="ph ph-buildings" style="font-size:20px;"></i> ข้อมูลองค์กร
              </h3>
            </div>
            <div class="card-body" style="padding:20px;">
              <div class="form-group mb-3">
                <label class="text-xs fw-600 text-muted" style="text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block;">ชื่อองค์กร</label>
                <input type="text" class="form-control" id="qrOrgName" style="border-radius:8px;padding:10px;" value="สำนักงาน" onchange="QRCodePage.settings.orgName=this.value; QRCodePage.renderPreview()">
              </div>
              <div class="form-group mb-3">
                <label class="text-xs fw-600 text-muted" style="text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block;">BASE URL สำหรับ QR</label>
                <input type="text" class="form-control" id="qrBaseUrl" style="border-radius:8px;padding:10px;font-family:monospace;font-size:12px;" placeholder="https://script.google.com/..." onchange="QRCodePage.settings.baseUrl=this.value; QRCodePage.renderPreview()">
              </div>
              <div style="display:flex;align-items:center;justify-content:space-between;background:var(--bg-input);padding:10px 14px;border-radius:10px;border:1px solid var(--border-color);">
                <div style="display:flex;align-items:center;gap:10px;">
                  <i class="ph ph-moon" style="font-size:18px;color:var(--text-muted);"></i>
                  <span class="text-sm fw-500">Dark Label Style</span>
                </div>
                <label class="toggle">
                  <input type="checkbox" onchange="QRCodePage.settings.darkLabel=this.checked; QRCodePage.renderPreview()">
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          </div>
        </div>

        
        <div>
          <div class="card">
            <div class="card-header">
              <h3>\uD83D\uDC41&#65039; ตัวอย่างก่อนพิมพ์</h3>
              <div class="text-sm text-muted">
                <span id="qrPreviewInfo">A4 &#183; 3 คอลัมน์ &#183; 0 Labels</span>
              </div>
            </div>
            <div class="card-body">
              <div class="qr-preview-container" id="qrPreviewGrid"></div>
              <p class="text-xs text-muted text-center mt-1">\uD83D\uDCA1 คลิก 1 Label เพื่อดูรายละเอียด &#183; ลาก เรียงใหม่ได้</p>
            </div>
          </div>
        </div>
      </div>

      
      <div class="modal-overlay" id="qrAssetSelectModal">
        <div class="modal modal-lg">
          <div class="modal-header">
            <h3>\uD83D\uDCCB เลือกอุปกรณ์สำหรับ QR</h3>
            <button class="modal-close" onclick="closeModal('qrAssetSelectModal')">&#10005;</button>
          </div>
          <div class="modal-body">
            <input type="text" class="form-control mb-2" id="qrAssetSearch" placeholder="ค้นหาอุปกรณ์..." oninput="QRCodePage.filterAssetList(this.value)">
            <div style="max-height:400px;overflow-y:auto" id="qrAssetList"></div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('qrAssetSelectModal')">ปิด</button>
            <button class="btn btn-primary" onclick="QRCodePage.confirmSelection()">&#9989; ยืนยัน</button>
          </div>
        </div>
      </div>
    `;
    },

    setPaper: function (size) {
      this.settings.paperSize = size;
      document.querySelectorAll('[id^="paper"]').forEach(function (b) {
        b.className = b.className.replace('btn-primary', 'btn-outline');
      });
      document.getElementById('paper' + size).className = document.getElementById('paper' + size).className.replace('btn-outline', 'btn-primary');
      this.renderPreview();
    },

    setColumns: function (cols) {
      this.settings.columns = cols;
      document.querySelectorAll('.btn-col').forEach(function (b) {
        b.className = b.className.replace('btn-primary', 'btn-outline');
      });
      document.getElementById('colBtn' + cols).className = 'btn btn-primary btn-sm btn-col';
      this.renderPreview();
    },

    setStyle: function (style) {
      this.settings.labelStyle = style;
      document.querySelectorAll('.btn-style').forEach(function (b) {
        b.className = b.className.replace('btn-primary', 'btn-outline');
      });
      const id = style === 'vertical' ? 'styleVertical' : 'styleHorizontal';
      document.getElementById(id).className = 'btn btn-primary btn-sm btn-style';
      this.renderPreview();
    },

    selectAssets: function () {
      this.renderAssetSelector();
      openModal('qrAssetSelectModal');
    },

    renderAssetSelector: function () {
      const list = document.getElementById('qrAssetList');
      if (!list || !this.allAssets) return;

      list.innerHTML = this.allAssets.map(function (a) {
        const checked = QRCodePage.selectedAssets.some(function (s) { return s.id === a.id; });
        return '<label class="checkbox-wrap" style="padding:8px;border-bottom:1px solid var(--border-color)">' +
          '<input type="checkbox" value="' + a.id + '" ' + (checked ? 'checked' : '') + ' onchange="QRCodePage.toggleAsset(\'' + a.id + '\', this.checked)">' +
          '<div><div class="fw-600">' + a.name + '</div><div class="text-xs text-muted">' + (a.asset_code || '') + '</div></div></label>';
      }).join('');
    },

    filterAssetList: function (query) {
      const items = document.querySelectorAll('#qrAssetList label');
      items.forEach(function (item) {
        const text = item.textContent.toLowerCase();
        item.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
      });
    },

    toggleAsset: function (id, checked) {
      if (checked) {
        const asset = this.allAssets.find(function (a) { return a.id === id; });
        if (asset && !this.selectedAssets.some(function (s) { return s.id === id; })) {
          this.selectedAssets.push(asset);
        }
      } else {
        this.selectedAssets = this.selectedAssets.filter(function (a) { return a.id !== id; });
      }
    },

    confirmSelection: function () {
      closeModal('qrAssetSelectModal');
      this.renderPreview();
    },

    renderPreview: function () {
      const grid = document.getElementById('qrPreviewGrid');
      if (!grid) return;

      const s = this.settings;
      const assets = this.selectedAssets;

      document.getElementById('qrSelectedCount').textContent = assets.length;
      document.getElementById('qrLabelCount').textContent = assets.length;

      const labelsPerPage = s.columns * (s.paperSize === 'A4' ? 8 : s.paperSize === 'A5' ? 4 : 1);
      const pages = Math.ceil(assets.length / labelsPerPage) || 1;
      document.getElementById('qrPageCount').textContent = pages;
      document.getElementById('qrPreviewInfo').textContent = s.paperSize + ' &#183; ' + s.columns + ' คอลัมน์ &#183; ' + assets.length + ' Labels';

      let html = '<div style="display:grid; grid-template-columns: repeat(' + s.columns + ', 1fr); gap:10px; padding:10px; border:1px dashed #ccc; border-radius:8px;">';

      if (assets.length === 0) {
        html += '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--text-muted)">เลือกอุปกรณ์เพื่อสร้าง QR Label</div>';
      }

      assets.forEach(function (a, idx) {
        const darkClass = s.darkLabel ? ' dark' : '';
        const layout = s.labelStyle === 'horizontal' ? 'display:flex;gap:8px;align-items:center;text-align:left' : '';

        html += '<div class="qr-label' + darkClass + '" style="' + layout + '" onclick="App.navigate(\'asset-detail\', {id:\'' + a.id + '\'})">';
        const qrData = encodeURIComponent(s.baseUrl ? s.baseUrl + '?id=' + a.id : a.id);
        const size = s.labelStyle === 'horizontal' ? 60 : 80;
        const qrColor = s.darkLabel ? '0-172-200' : '51-51-51';
        const qrBg = s.darkLabel ? '26-26-46' : '255-255-255';
        html += '<img class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&data=' + qrData + '&color=' + qrColor + '&bgcolor=' + qrBg + '" style="' + (s.labelStyle === 'horizontal' ? 'width:60px;height:60px' : 'width:80px;height:80px;margin:0 auto') + '">';
        html += '<div>';
        if (s.showName) html += '<div class="asset-name">' + a.name + '</div>';
        if (s.showCode) html += '<div class="asset-code">' + (a.asset_code || '') + '</div>';
        if (s.showSerial && a.serial_number) html += '<div class="asset-code">' + a.serial_number + '</div>';
        if (s.showDept && a.departments) html += '<div class="label-dept">' + a.departments.name + '</div>';
        if (s.showStatus) {
          const statusColor = a.status === 'ใช้งาน' ? '#2ECC71' : a.status === 'ส่งซ่อม' ? '#F39C12' : '#E74C3C';
          html += '<div class="label-status" style="background:' + statusColor + ';color:white">' + a.status + '</div>';
        }
        html += '</div></div>';
      });

      html += '</div>';
      grid.innerHTML = html;
    },

    print: function () {
      const printArea = document.getElementById('qrPreviewGrid').innerHTML;
      const w = window.open('', '_blank');
      w.document.write('<html><head><style>body{font-family:Prompt,sans-serif;padding:10px} .qr-label{border:1px solid #ddd;border-radius:8px;padding:10px;text-align:center;break-inside:avoid;font-size:10px} .qr-label.dark{background:#1A1A2E;color:white;border-color:#333} .asset-name{font-weight:600;font-size:11px;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap} .asset-code{color:#999;font-size:9px} .label-dept{display:inline-block;padding:1px 6px;background:#0DCAF0;color:white;border-radius:3px;font-size:8px;margin-top:4px} .label-status{display:inline-block;padding:1px 6px;border-radius:3px;font-size:8px;margin-top:2px}</style></head><body>' + printArea + '</body></html>');
      w.document.close();
      setTimeout(function () { w.print(); }, 500);
    },

    downloadPDF: function () {
      const assets = this.selectedAssets;
      if (assets.length === 0) {
        App.toast('กรุณาเลือกอุปกรณ์อย่างน้อย 1 รายการ', 'warning');
        return;
      }

      App.showLoading(true, 'กำลังสร้าง PDF...');

      const { jsPDF } = window.jspdf;
      const previewGrid = document.getElementById('qrPreviewGrid');

      // Create fixed-width temporary container for consistent A4-like layout
      const tempContainer = document.createElement('div');
      tempContainer.style.position = 'absolute';
      tempContainer.style.left = '-9999px';
      tempContainer.style.top = '0';
      tempContainer.style.width = '800px';
      tempContainer.style.background = 'white';
      tempContainer.innerHTML = previewGrid.innerHTML;
      document.body.appendChild(tempContainer);

      const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });

      doc.html(tempContainer, {
        callback: function (doc) {
          doc.save('QR_Labels_' + new Date().toISOString().slice(0, 10) + '.pdf');
          document.body.removeChild(tempContainer);
          App.showLoading(false);
          App.toast('ดาวน์โหลด PDF สำเร็จ', 'success');
        },
        x: 10,
        y: 10,
        width: 190,
        windowWidth: 800, // Fixed reference width
        html2canvas: {
          useCORS: true,
          logging: false,
          scale: 3 // Higher quality
        }
      });
    },

    downloadPNG: function () {
      const grid = document.getElementById('qrPreviewGrid');
      // Use canvas-based approach
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = grid.offsetWidth * 2;
      canvas.height = grid.offsetHeight * 2;
      ctx.scale(2, 2);
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Simple screenshot approach &#8212; draw text
      App.toast('กรุณาใช้ PDF สำหรับคุณภาพที่ดีกว่า', 'info');
      this.downloadPDF();
    }
  };
</script>
<script>
  /**
   * scan.html &#8212; Mobile QR Scanner Page
   */
  const ScanPage = {
    scanner: null,
    isContinuous: false,
    scannedIds: [],

    load: function () {
      const container = document.getElementById('page-scan');
      container.innerHTML = this.getTemplate();
      this.scannedIds = [];
      this.updateAuditBadge();
    },

    getTemplate: function () {
      return `
      <div style="max-width:600px;margin:0 auto;">
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <div>
            <h2 style="font-size:22px; font-weight:700; color:var(--text-primary);">\uD83D\uDCF8 ตรวจนับอุปกรณ์</h2>
            <p class="text-sm text-muted">ใช้มือถือสแกน QR Code ตรวจทรัพย์สินประจำปี</p>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <label class="switch" title="เปิดเพื่อสแกนต่อเนื่องโดยไม่ปิดกล้อง">
              <input type="checkbox" id="continuousToggle" onchange="ScanPage.toggleContinuous(this.checked)">
              <span class="slider round"></span>
            </label>
            <span class="text-sm fw-600 px-1">Continuous Mode</span>
          </div>
        </div>

        <div class="card mb-3" style="box-shadow:var(--shadow); border:none;">
          <div class="card-body text-center">
            <div id="scannerContainer" style="width:100%;max-width:400px;margin:0 auto;border-radius:12px;overflow:hidden;background:#000;aspect-ratio:1;"></div>
            
            <div class="btn-group" style="justify-content:center;margin-top:20px;gap:12px;">
              <button class="btn btn-primary" id="startScanBtn" style="padding:12px 24px;border-radius:30px;font-size:16px;" onclick="ScanPage.startScan()">
                \uD83D\uDCF7 เปิดกล้องสแกน
              </button>
              <button class="btn btn-danger" id="stopScanBtn" style="display:none;padding:12px 24px;border-radius:30px;font-size:16px;" onclick="ScanPage.stopScan()">
                \u23F9\uFE0F หยุดสแกน
              </button>
            </div>
          </div>
        </div>

        <div class="card mb-3" id="scanSummary" style="display:none; border:2px solid var(--success); background:#F6FFED;">
          <div class="card-body" style="padding:16px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <h3 style="color:var(--success); margin:0;">\u2705 สแกนล่าสุด</h3>
              <span class="badge" style="background:var(--success); padding:6px 12px; border-radius:20px;" id="scannedCountBadge">0 รายการ</span>
            </div>
            <div id="latestScanName" class="fw-600 mt-2 text-lg"></div>
            <div id="latestScanCode" class="text-muted text-sm"></div>
            <div class="mt-2 text-xs" style="color:var(--success);"><i class="ph ph-check-circle"></i> บันทึกประวัติการตรวจนับเรียบร้อยแล้ว</div>
          </div>
        </div>

        <div class="card mt-2">
          <div class="card-header" style="background:var(--bg-card); border-bottom:1px solid var(--border-color); padding:16px 20px;">
            <h3 style="color:var(--primary-dark);"><i class="ph ph-keyboard" style="vertical-align:middle;font-size:20px;"></i> ค้นหาด้วยรหัส (Manual)</h3>
          </div>
          <div class="card-body" style="padding:20px;">
            <div style="display:flex;gap:12px">
              <input type="text" class="form-control" id="manualAssetCode" placeholder="รหัสทรัพย์สิน / SN..." onkeydown="if(event.key==='Enter') ScanPage.manualSearch()" style="padding:12px; border-radius:8px;">
              <button class="btn btn-primary" onclick="ScanPage.manualSearch()" style="border-radius:8px; padding:0 24px;"><i class="ph ph-magnifying-glass" style="font-size:18px;"></i></button>
            </div>
          </div>
        </div>
      </div>
    `;
    },

    toggleContinuous: function (checked) {
      this.isContinuous = checked;
    },

    playBeep: function () {
      // Short beep sound for scan success
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gainNode = ctx.createGain();
      osc.connect(gainNode);
      gainNode.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, ctx.currentTime);
      gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
      osc.start();
      osc.stop(ctx.currentTime + 0.1);
    },

    startScan: function () {
      const container = document.getElementById('scannerContainer');
      document.getElementById('startScanBtn').style.display = 'none';
      document.getElementById('stopScanBtn').style.display = 'inline-flex';
      document.getElementById('scanSummary').style.display = 'none';

      this.scanner = new Html5Qrcode('scannerContainer');
      this.scanner.start(
        { facingMode: 'environment' },
        {
          fps: 10,
          qrbox: { width: 250, height: 250 },
        },
        function (decodedText) {
          ScanPage.onScanSuccess(decodedText);
        },
        function (errorMessage) {
          // Ignore general scan errors
        }
      ).catch(function (err) {
        App.toast('ไม่สามารถเปิดกล้องได้: ' + err, 'error');
        ScanPage.stopScan();
      });
    },

    stopScan: function () {
      if (this.scanner) {
        this.scanner.stop().then(function () {
          document.getElementById('scannerContainer').innerHTML = '';
        }).catch(function () { });
      }
      document.getElementById('startScanBtn').style.display = 'inline-flex';
      document.getElementById('stopScanBtn').style.display = 'none';

      this.scanner = null;
    },

    onScanSuccess: function (decodedText) {
      // Pause scanner momentarily if continuous, or stop if single mode
      this.playBeep();

      if (!this.isContinuous) {
        this.stopScan();
      } else {
        if (this.scanner) {
          this.scanner.pause();
          setTimeout(() => { if (this.scanner) this.scanner.resume(); }, 1500);
        }
      }

      let assetId = decodedText;
      if (decodedText.includes('id=')) {
        assetId = decodedText.split('id=')[1].split('&')[0];
      }

      this.processScan(assetId);
    },

    manualSearch: function () {
      const code = document.getElementById('manualAssetCode').value.trim();
      if (!code) { App.toast('กรุณาป้อนรหัส', 'warning'); return; }
      this.processScan(code);
      document.getElementById('manualAssetCode').value = '';
    },

    processScan: function (idOrCode) {
      if (this.scannedIds.includes(idOrCode)) {
        // Prevent immediate duplicates in continuous mode
        App.toast('สแกนซ้ำ', 'info');
        return;
      }

      this.scannedIds.push(idOrCode);
      this.updateAuditBadge();
      App.toast('สแกนสำเร็จ!', 'success');

      const summaryDiv = document.getElementById('scanSummary');
      summaryDiv.style.display = 'block';
      document.getElementById('latestScanName').innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:2px;"></div> กำลังบันทึกการตรวจนับ...';
      document.getElementById('latestScanCode').innerText = idOrCode;

      // 1. Mark Audited
      google.script.run
        .withSuccessHandler(function (asset) {
          if (asset) {
            document.getElementById('latestScanName').innerText = asset.name;
            document.getElementById('latestScanCode').innerText = (asset.asset_code || '') + (asset.serial_number ? ' (SN: ' + asset.serial_number + ')' : '');
          } else {
            // Might be searching by code
            google.script.run
              .withSuccessHandler(function (searchResult) {
                if (searchResult.data && searchResult.data.length > 0) {
                  const foundAsset = searchResult.data[0];
                  // Mark this specific asset as audited now that we have its real ID
                  google.script.run.markAssetAudited(foundAsset.id);
                  document.getElementById('latestScanName').innerText = foundAsset.name;
                  document.getElementById('latestScanCode').innerText = foundAsset.asset_code || '';
                } else {
                  document.getElementById('latestScanName').innerHTML = '<span class="text-danger">\u274C ไม่พบอุปกรณ์ในระบบ</span>';
                }
              })
              .getAssets({ search: idOrCode, pageSize: 1 });
          }
        })
        .withFailureHandler(function (err) {
          document.getElementById('latestScanName').innerText = 'เกิดข้อผิดพลาดในการบันทึกข้อมูล';
        })
        .markAssetAudited(idOrCode);
    },

    updateAuditBadge: function () {
      const badge = document.getElementById('scannedCountBadge');
      if (badge) {
        badge.innerText = this.scannedIds.length + ' รายการ';
      }
    }
  };
</script>
<script>
  /**
   * tickets.html &#8212; Repair Ticket Page
   */
  const TicketsPage = {
    sortColumn: 'created_at',
    sortDirection: 'desc',

    load: function () {
      const container = document.getElementById('page-tickets');
      container.innerHTML = this.getTemplate();
      App.makeTHSortable('page-tickets', 'TicketsPage', [
        null, { col: 'asset_id' }, { col: 'description' }, { col: 'status' }, { col: 'priority' }, { col: 'created_at' }, null
      ]);
      this.fetchTickets();
    },

    sortBy: function (column) {
      if (this.sortColumn === column) {
        this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        this.sortColumn = column;
        this.sortDirection = 'asc';
      }
      App.updateSortIcons('TicketsPage', ['asset_id', 'description', 'status', 'priority', 'created_at'], this.sortColumn, this.sortDirection);
      this.fetchTickets();
    },

    getTemplate: function () {
      return `
      <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <input type="text" class="form-control" id="ticketSearch" style="max-width:300px" placeholder="ค้นหา Ticket..." onkeydown="if(event.key==='Enter') TicketsPage.fetchTickets()">
        <select class="form-control" id="ticketStatusFilter" style="width:auto" onchange="TicketsPage.fetchTickets()">
          <option value="">สถานะทั้งหมด</option>
          <option value="open">เปิด</option>
          <option value="in_progress">กำลังดำเนินการ</option>
          <option value="resolved">แก้ไขแล้ว</option>
          <option value="closed">ปิด</option>
        </select>
        <div style="flex:1"></div>
        <button class="btn btn-primary" onclick="TicketsPage.openNew()">&#10133; สร้าง Ticket</button>
      </div>
      
      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Ticket #</th>
                <th>อุปกรณ์</th>
                <th>ปัญหา</th>
                <th>สถานะ</th>
                <th>ลำดับความสำคัญ</th>
                <th>วันที่สร้าง</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody id="ticketsBody">
              <tr><td colspan="7" class="text-center text-muted" style="padding:30px">กำลังโหลด...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      
      <div class="modal-overlay" id="ticketModal">
        <div class="modal">
          <div class="modal-header">
            <h3 id="ticketModalTitle">&#10133; สร้าง Ticket ใหม่</h3>
            <button class="modal-close" onclick="closeModal('ticketModal')">&#10005;</button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="editTicketId">
            <div class="form-group">
              <label>อุปกรณ์ *</label>
              <select class="form-control" id="ticketAssetId">
                <option value="">-- เลือกอุปกรณ์ --</option>
              </select>
            </div>
            <div class="form-group">
              <label>ปัญหา / รายละเอียด *</label>
              <textarea class="form-control" id="ticketDescription" rows="3" placeholder="อธิบายปัญหา"></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>ลำดับความสำคัญ</label>
                <select class="form-control" id="ticketPriority">
                  <option value="low">ต่ำ</option>
                  <option value="normal" selected>ปกติ</option>
                  <option value="high">สูง</option>
                  <option value="critical">เร่งด่วน</option>
                </select>
              </div>
              <div class="form-group">
                <label>สถานะ</label>
                <select class="form-control" id="ticketStatus">
                  <option value="open">เปิด</option>
                  <option value="in_progress">กำลังดำเนินการ</option>
                  <option value="resolved">แก้ไขแล้ว</option>
                  <option value="closed">ปิด</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>ผู้ดูแล</label>
              <input type="text" class="form-control" id="ticketAssignee" placeholder="ชื่อผู้ดูแล">
            </div>
            <div class="form-group">
              <label>หมายเหตุ</label>
              <textarea class="form-control" id="ticketNotes" rows="2" placeholder="หมายเหตุเพิ่มเติม"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('ticketModal')">ยกเลิก</button>
            <button class="btn btn-primary" onclick="TicketsPage.saveTicket()">\uD83D\uDCBE บันทึก</button>
          </div>
        </div>
      </div>
    `;
    },

    fetchTickets: async function () {
      const search = document.getElementById('ticketSearch') ? document.getElementById('ticketSearch').value.trim() : '';
      const status = document.getElementById('ticketStatusFilter') ? document.getElementById('ticketStatusFilter').value : '';

      App.showLoading(true);
      try {
        let filter = [];
        if (status) filter.push('status=eq.' + status);
        if (search) {
          filter.push('or=(description.ilike.%' + search + '%,notes.ilike.%' + search + '%)');
        }

        const filterStr = filter.length > 0 ? filter.join('&') : null;
        var orderStr = (TicketsPage.sortColumn || 'created_at') + '.' + (TicketsPage.sortDirection || 'desc');
        const result = await App.supabaseSelect('repair_tickets', '*, assets(name)', filterStr, orderStr);

        TicketsPage.renderTickets(result || []);
      } catch (err) {
        App.toast('ไม่สามารถโหลด Tickets', 'error');
        console.error(err);
      } finally {
        App.showLoading(false);
      }
    },

    renderTickets: function (tickets) {
      const tbody = document.getElementById('ticketsBody');
      if (tickets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted" style="padding:30px">ไม่มี Ticket</td></tr>';
        return;
      }

      const priorityBadge = { low: '\uD83D\uDFE2 ต่ำ', normal: '\uD83D\uDD35 ปกติ', high: '\uD83D\uDFE0 สูง', critical: '\uD83D\uDD34 เร่งด่วน' };
      const statusBadge = {
        open: '<span class="badge" style="background:#E74C3C;color:white">เปิด</span>',
        in_progress: '<span class="badge" style="background:#F39C12;color:white">กำลังดำเนินการ</span>',
        resolved: '<span class="badge" style="background:#2ECC71;color:white">แก้ไขแล้ว</span>',
        closed: '<span class="badge" style="background:#95A5A6;color:white">ปิด</span>'
      };

      tbody.innerHTML = tickets.map(function (t, idx) {
        return '<tr>' +
          '<td class="fw-600">#' + (idx + 1) + '</td>' +
          '<td>' + (t.assets ? t.assets.name : '-') + '</td>' +
          '<td>' + (t.description || '').substring(0, 50) + '</td>' +
          '<td>' + (statusBadge[t.status] || t.status) + '</td>' +
          '<td>' + (priorityBadge[t.priority] || t.priority) + '</td>' +
          '<td class="text-sm">' + App.formatDate(t.created_at) + '</td>' +
          '<td><button class="btn btn-sm btn-outline" onclick="TicketsPage.edit(\'' + t.id + '\')">&#9999;&#65039;</button></td>' +
          '</tr>';
      }).join('');
    },

    openNew: async function () {
      document.getElementById('ticketModalTitle').textContent = '&#10133; สร้าง Ticket ใหม่';
      document.getElementById('editTicketId').value = '';
      document.getElementById('ticketDescription').value = '';
      document.getElementById('ticketPriority').value = 'normal';
      document.getElementById('ticketStatus').value = 'open';
      document.getElementById('ticketAssignee').value = '';
      document.getElementById('ticketNotes').value = '';

      // Load assets for select
      const select = document.getElementById('ticketAssetId');
      select.innerHTML = '<option value="">-- \u0e01\u0e33\u0e25\u0e31\u0e07\u0e42\u0e2b\u0e25\u0e14... --</option>';
      openModal('ticketModal');

      try {
        const assets = await App.supabaseSelect('assets', 'id,name,asset_code', null, 'name.asc', 200);
        select.innerHTML = '<option value="">-- \u0e40\u0e25\u0e37\u0e2d\u0e01 --</option>';
        (assets || []).forEach(function (a) {
          select.innerHTML += '<option value="' + a.id + '">' + a.name + ' (' + (a.asset_code || '') + ')</option>';
        });
        App.initSearchableSelect('ticketAssetId', assets || []);
      } catch (err) {
        select.innerHTML = '<option value="">-- \u0e1c\u0e34\u0e14\u0e1e\u0e25\u0e32\u0e14\u0e43\u0e19\u0e01\u0e32\u0e23\u0e42\u0e2b\u0e25\u0e14 --</option>';
      }
    },

    edit: async function (ticketId) {
      App.showLoading(true);
      try {
        const result = await App.supabaseSelect('repair_tickets', '*, assets(name,asset_code)', 'id=eq.' + ticketId);
        if (!result || result.length === 0) throw new Error('Ticket not found');

        const ticket = result[0];
        document.getElementById('ticketModalTitle').textContent = '&#9999;&#65039; \u0e41\u0e01\u0e49\u0e44\u0e02 Ticket';
        document.getElementById('editTicketId').value = ticket.id;
        document.getElementById('ticketDescription').value = ticket.description || '';
        document.getElementById('ticketPriority').value = ticket.priority || 'normal';
        document.getElementById('ticketStatus').value = ticket.status || 'open';
        document.getElementById('ticketAssignee').value = ticket.assigned_to || '';
        document.getElementById('ticketNotes').value = ticket.notes || '';

        const select = document.getElementById('ticketAssetId');
        select.innerHTML = '<option value="' + ticket.asset_id + '">' + (ticket.assets ? ticket.assets.name : 'Unknown Asset') + '</option>';

        openModal('ticketModal');

        // Load all assets for searchable select
        const assets = await App.supabaseSelect('assets', 'id,name,asset_code', null, 'name.asc', 200);
        select.innerHTML = '<option value="">-- \u0e40\u0e25\u0e37\u0e2d\u0e01 --</option>';
        (assets || []).forEach(function (a) {
          select.innerHTML += '<option value="' + a.id + '">' + a.name + ' (' + (a.asset_code || '') + ')</option>';
        });
        App.initSearchableSelect('ticketAssetId', assets || [], null, ticket.asset_id);
      } catch (err) {
        App.toast('\u0e44\u0e21\u0e48\u0e2a\u0e32\u0e21\u0e32\u0e23\u0e16\u0e42\u0e2b\u0e25\u0e14 Ticket', 'error');
        console.error(err);
      } finally {
        App.showLoading(false);
      }
    },

    saveTicket: function () {
      const data = {
        asset_id: document.getElementById('ticketAssetId').value || null,
        description: document.getElementById('ticketDescription').value.trim(),
        priority: document.getElementById('ticketPriority').value,
        status: document.getElementById('ticketStatus').value,
        assigned_to: document.getElementById('ticketAssignee').value.trim() || null,
        notes: document.getElementById('ticketNotes').value.trim() || null
      };

      if (!data.description) { App.toast('กรุณากรอกรายละเอียดปัญหา', 'warning'); return; }

      const editId = document.getElementById('editTicketId').value;
      App.showLoading(true);

      const handler = function () {
        App.showLoading(false);
        closeModal('ticketModal');
        App.toast(editId ? 'อัปเดต Ticket เรียบร้อย' : 'สร้าง Ticket เรียบร้อย', 'success');
        TicketsPage.fetchTickets();
      };
      const errHandler = function (err) {
        App.showLoading(false);
        App.toast('เกิดข้อผิดพลาด', 'error');
      };

      if (editId) {
        google.script.run.withSuccessHandler(handler).withFailureHandler(errHandler).updateTicket(editId, data);
      } else {
        google.script.run.withSuccessHandler(handler).withFailureHandler(errHandler).createTicket(data);
      }
    }
  };
</script>
<script>
  /**
   * warranty.html &#8212; Warranty Tracking Page
   */
  const WarrantyPage = {
    allAssets: [],
    sortColumn: 'warranty_expiry',
    sortDirection: 'asc',

    load: function () {
      const container = document.getElementById('page-warranty');
      container.innerHTML = this.getTemplate();
      App.makeTHSortable('page-warranty', 'WarrantyPage', [
        { col: 'name' }, { col: 'supplier' }, { col: 'purchase_date' }, { col: 'warranty_expiry' }, null, null
      ]);
      this.fetchAssets();
    },

    sortBy: function (column) {
      if (this.sortColumn === column) {
        this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        this.sortColumn = column;
        this.sortDirection = 'asc';
      }
      App.updateSortIcons('WarrantyPage', ['name', 'supplier', 'purchase_date', 'warranty_expiry'], this.sortColumn, this.sortDirection);
      this.filterTable(document.getElementById('warrantyFilter') ? document.getElementById('warrantyFilter').value : 'all');
    },

    getTemplate: function () {
      return `
      
      <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr)">
        <div class="stat-card">
          <div class="stat-icon green">&#9989;</div>
          <div>
            <div class="stat-value" id="warrantyActive">-</div>
            <div class="stat-label">ยังอยู่ในประกัน</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">&#9888;&#65039;</div>
          <div>
            <div class="stat-value" id="warrantyExpiring">-</div>
            <div class="stat-label">ใกล้หมดประกัน (30 วัน)</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red">&#10060;</div>
          <div>
            <div class="stat-value" id="warrantyExpired">-</div>
            <div class="stat-label">หมดประกันแล้ว</div>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:12px;margin-bottom:16px">
        <select class="form-control" id="warrantyFilter" style="width:auto" onchange="WarrantyPage.filterTable(this.value)">
          <option value="all">ทั้งหมดที่มีประกัน</option>
          <option value="active">ยังอยู่ในประกัน</option>
          <option value="expiring">ใกล้หมด (30 วัน)</option>
          <option value="expired">หมดประกันแล้ว</option>
        </select>
        <div style="flex:1"></div>
        <button class="btn btn-outline" onclick="WarrantyPage.sendNotifications()">\uD83D\uDCE7 ส่งแจ้งเตือนทั้งหมด</button>
      </div>

      <div class="card">
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>อุปกรณ์</th>
                <th>ผู้จำหน่าย</th>
                <th>วันที่ซื้อ</th>
                <th>วันหมดประกัน</th>
                <th>เหลืออีก</th>
                <th>สถานะ</th>
              </tr>
            </thead>
            <tbody id="warrantyBody">
              <tr><td colspan="6" class="text-center text-muted" style="padding:30px">กำลังโหลด...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    `;
    },

    fetchAssets: async function () {
      App.showLoading(true);
      try {
        const result = await App.supabaseSelect('assets', '*', 'warranty_expiry=not.is.null', 'warranty_expiry.asc');
        WarrantyPage.allAssets = result || [];
        WarrantyPage.renderStats(WarrantyPage.allAssets);
        WarrantyPage.renderTable(WarrantyPage.allAssets);
      } catch (err) {
        console.error('Fetch warranty error:', err);
        App.toast('ไม่สามารถโหลดข้อมูล', 'error');
      } finally {
        App.showLoading(false);
      }
    },

    renderStats: function (assets) {
      const now = new Date();
      const thirtyDays = new Date(now.getTime() + 30 * 86400000);
      let active = 0, expiring = 0, expired = 0;

      assets.forEach(function (a) {
        const exp = new Date(a.warranty_expiry);
        if (exp < now) expired++;
        else if (exp < thirtyDays) expiring++;
        else active++;
      });

      document.getElementById('warrantyActive').textContent = active;
      document.getElementById('warrantyExpiring').textContent = expiring;
      document.getElementById('warrantyExpired').textContent = expired;
    },

    renderTable: function (assets) {
      const tbody = document.getElementById('warrantyBody');
      // Sort
      assets = App.sortData(assets, this.sortColumn, this.sortDirection);
      if (assets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted" style="padding:30px">ไม่มีข้อมูลประกัน</td></tr>';
        return;
      }

      const now = new Date();
      tbody.innerHTML = assets.map(function (a) {
        const exp = new Date(a.warranty_expiry);
        const diffDays = Math.ceil((exp - now) / 86400000);
        let statusBadge, daysText;

        if (diffDays < 0) {
          statusBadge = '<span class="badge" style="background:#E74C3C;color:white">หมดประกัน</span>';
          daysText = '<span class="text-danger">หมดแล้ว ' + Math.abs(diffDays) + ' วัน</span>';
        } else if (diffDays <= 30) {
          statusBadge = '<span class="badge" style="background:#F39C12;color:white">ใกล้หมด</span>';
          daysText = '<span class="text-warning fw-600">' + diffDays + ' วัน</span>';
        } else {
          statusBadge = '<span class="badge" style="background:#2ECC71;color:white">อยู่ในประกัน</span>';
          daysText = '<span class="text-success">' + diffDays + ' วัน</span>';
        }

        return '<tr style="cursor:pointer" onclick="App.navigate(\'asset-detail\', {id:\'' + a.id + '\'})">' +
          '<td><div class="fw-600">' + a.name + '</div><div class="text-xs text-muted">' + (a.asset_code || '') + '</div></td>' +
          '<td>' + (a.supplier || '-') + '</td>' +
          '<td class="text-sm">' + App.formatDate(a.purchase_date) + '</td>' +
          '<td class="text-sm">' + App.formatDate(a.warranty_expiry) + '</td>' +
          '<td>' + daysText + '</td>' +
          '<td>' + statusBadge + '</td></tr>';
      }).join('');
    },

    filterTable: function (filter) {
      const now = new Date();
      const thirtyDays = new Date(now.getTime() + 30 * 86400000);
      let filtered = this.allAssets;

      if (filter === 'active') filtered = filtered.filter(function (a) { return new Date(a.warranty_expiry) >= thirtyDays; });
      else if (filter === 'expiring') filtered = filtered.filter(function (a) { const d = new Date(a.warranty_expiry); return d >= now && d < thirtyDays; });
      else if (filter === 'expired') filtered = filtered.filter(function (a) { return new Date(a.warranty_expiry) < now; });

      this.renderTable(filtered);
    },

    sendNotifications: function () {
      App.showLoading(true);
      google.script.run
        .withSuccessHandler(function (result) {
          App.showLoading(false);
          App.toast('ส่งแจ้งเตือน ' + (result.count || 0) + ' รายการ', 'success');
        })
        .withFailureHandler(function (err) {
          App.showLoading(false);
          App.toast('เกิดข้อผิดพลาด', 'error');
        })
        .checkWarrantyExpiry();
    }
  };
</script>
