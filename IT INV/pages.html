<script>
  /**
   * dashboard.html &#8212; Dashboard Page
   */
  const DashboardPage = {
    charts: {},

    load: async function () {
      const container = document.getElementById('page-dashboard');
      container.innerHTML = this.getTemplate();
      App.showLoading(true);

      try {
        const nowISO = new Date().toISOString();
        const dateToday = nowISO.slice(0, 10);

        // Parallel fetching from Supabase natively
        const [allAssets, recentAssets, recentModAssets, recentActivity, openTickets, maintenanceDueArr, overdueCheckoutsArr] = await Promise.all([
          App.supabaseSelect('assets', 'id,status,warranty_expiry,created_at,price,categories(name),departments(name)'),
          App.supabaseSelect('assets', '*, categories(name, icon), departments(name)', null, 'created_at.desc', 8),
          App.supabaseSelect('assets', '*, categories(name, icon), departments(name)', null, 'updated_at.desc', 8),
          App.supabaseSelect('audit_log', '*, assets(name, asset_code)', null, 'created_at.desc', 10),
          App.supabaseSelect('repair_tickets', 'id', 'status=neq.เสร็จสิ้น&status=neq.ยกเลิก'),
          App.supabaseSelect('maintenance_schedules', 'id', 'status=eq.pending&next_due_at=lte.' + nowISO),
          App.supabaseSelect('asset_checkouts', 'id', 'status=eq.checked_out&expected_return_date=lt.' + dateToday)
        ]);

        const total = allAssets.length;
        let active = 0, repair = 0, returned = 0, spare = 0, damaged = 0, disposed = 0;
        let warrantyExpiring = 0;
        let totalValue = 0;

        const now = new Date();
        const thirtyDaysLater = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);

        const categoryStats = {};
        const departmentStats = {};

        allAssets.forEach(function (a) {
          switch (a.status) {
            case 'ใช้งาน': active++; break;
            case 'ส่งซ่อม': repair++; break;
            case 'ส่งคืน': returned++; break;
            case 'สำรอง': spare++; break;
            case 'ชำรุด': damaged++; break;
            case 'จำหน่าย': disposed++; break;
          }

          if (a.price) totalValue += parseFloat(a.price) || 0;

          if (a.warranty_expiry) {
            const expiry = new Date(a.warranty_expiry);
            if (expiry > now && expiry <= thirtyDaysLater) {
              warrantyExpiring++;
            }
          }

          const catName = (a.categories && a.categories.name) ? a.categories.name : 'ไม่ระบุ';
          if (!categoryStats[catName]) categoryStats[catName] = 0;
          categoryStats[catName]++;

          const deptName = (a.departments && a.departments.name) ? a.departments.name : 'ไม่ระบุ';
          if (!departmentStats[deptName]) departmentStats[deptName] = 0;
          departmentStats[deptName]++;
        });

        const monthlyStats = [];
        const thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
        for (let i = 11; i >= 0; i--) {
          const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
          const monthStr = (d.getMonth() + 1).toString().padStart(2, '0');
          const monthStart = d.getFullYear() + '-' + monthStr;
          const count = allAssets.filter(function (a) {
            return a.created_at && a.created_at.slice(0, 7) === monthStart;
          }).length;
          monthlyStats.push({
            month: monthStart,
            label: thaiMonths[d.getMonth()] + ' ' + ((d.getFullYear() + 543).toString().substring(2)),
            count: count
          });
        }

        const stats = {
          total: total,
          active: active,
          repair: repair,
          returned: returned,
          spare: spare,
          damaged: damaged,
          disposed: disposed,
          warrantyExpiring: warrantyExpiring,
          statusChart: {
            labels: ['ใช้งาน', 'ส่งซ่อม', 'สำรอง', 'อื่น'],
            data: [active, repair, spare, returned + damaged + disposed]
          },
          categoryChart: { labels: Object.keys(categoryStats), data: Object.values(categoryStats) },
          departmentChart: { labels: Object.keys(departmentStats), data: Object.values(departmentStats) },
          monthlyStats: monthlyStats,
          recentAssets: recentAssets,
          recentModAssets: recentModAssets,
          recentActivity: recentActivity,
          openTickets: openTickets ? openTickets.length : 0,
          maintenanceDue: maintenanceDueArr ? maintenanceDueArr.length : 0,
          overdueCheckouts: overdueCheckoutsArr ? overdueCheckoutsArr.length : 0,
          totalValue: totalValue
        };

        DashboardPage.render(stats);
      } catch (err) {
        console.error('Dashboard error:', err);
        App.toast('ไม่สามารถโหลดข้อมูล Dashboard', 'error');
      } finally {
        App.showLoading(false);
      }
    },

    getTemplate: function () {
      var html = '';
      html += '<div class="stats-grid">';
      html += '  <div class="stat-card" onclick="App.navigate(\'assets\')">';
      html += '    <div class="stat-icon blue">\uD83D\uDCE6</div>';
      html += '    <div>';
      html += '      <div class="stat-value" id="statTotal"><div class="skeleton" style="width:60px;height:32px"></div></div>';
      html += '      <div class="stat-label">อุปกรณ์ทั้งหมด</div>';
      html += '      <div class="stat-change up" id="statTotalChange"></div>';
      html += '    </div>';
      html += '  </div>';
      html += '  <div class="stat-card">';
      html += '    <div class="stat-icon green">&#9989;</div>';
      html += '    <div>';
      html += '      <div class="stat-value" id="statActive"><div class="skeleton" style="width:60px;height:32px"></div></div>';
      html += '      <div class="stat-label">ใช้งานปกติ</div>';
      html += '      <div class="stat-change" id="statActivePercent"></div>';
      html += '    </div>';
      html += '  </div>';
      html += '  <div class="stat-card" onclick="App.navigate(\'tickets\')">';
      html += '    <div class="stat-icon orange">\uD83D\uDD27</div>';
      html += '    <div>';
      html += '      <div class="stat-value" id="statRepair"><div class="skeleton" style="width:60px;height:32px"></div></div>';
      html += '      <div class="stat-label">ซ่อม / ส่งซ่อม</div>';
      html += '    </div>';
      html += '  </div>';
      html += '  <div class="stat-card" onclick="App.navigate(\'warranty\')">';
      html += '    <div class="stat-icon red">&#9888;&#65039;</div>';
      html += '    <div>';
      html += '      <div class="stat-value" id="statWarranty"><div class="skeleton" style="width:60px;height:32px"></div></div>';
      html += '      <div class="stat-label">ประกันใกล้หมด 30 วัน</div>';
      html += '    </div>';
      html += '  </div>';
      html += '</div>';

      html += '<div class="layout-grid">';
      html += '  <div>';

      html += '    <div class="card mb-2">';
      html += '      <div class="card-header" style="flex-wrap:wrap; gap:12px">';
      html += '        <div style="display:flex; align-items:center; gap:16px;">';
      html += '          <h3 style="margin:0">\uD83D\uDCCB อุปกรณ์ล่าสุด</h3>';
      html += '          <div class="btn-group">';
      html += '            <button class="btn btn-sm btn-primary" id="btnTabAdded" onclick="DashboardPage.switchRecentTab(\'added\')">เพิ่มใหม่</button>';
      html += '            <button class="btn btn-sm btn-outline" id="btnTabModified" onclick="DashboardPage.switchRecentTab(\'modified\')">แก้ไขล่าสุด</button>';
      html += '          </div>';
      html += '        </div>';
      html += '        <div class="btn-group" id="dashStatusFilter">';
      html += '          <button class="btn btn-sm btn-primary" id="btnFilterAll" onclick="DashboardPage.filterRecent(\'all\', this)">ทั้งหมด</button>';
      html += '          <button class="btn btn-sm btn-outline" id="btnFilterActive" onclick="DashboardPage.filterRecent(\'ใช้งาน\', this)">ใช้งาน</button>';
      html += '          <button class="btn btn-sm btn-outline" id="btnFilterRepair" onclick="DashboardPage.filterRecent(\'ส่งซ่อม\', this)">ส่งซ่อม</button>';
      html += '          <button class="btn btn-sm btn-outline" onclick="App.navigate(\'assets\')">ดูทั้งหมด &#8594;</button>';
      html += '        </div>';
      html += '      </div>';
      html += '      <div class="table-container">';
      html += '        <table>';
      html += '          <thead>';
      html += '            <tr>';
      html += '              <th>ชื่ออุปกรณ์</th>';
      html += '              <th>แผนก</th>';
      html += '              <th>สถานะ</th>';
      html += '              <th>QR</th>';
      html += '              <th>จัดการ</th>';
      html += '            </tr>';
      html += '          </thead>';
      html += '          <tbody id="recentAssetsBody">';
      html += '            <tr><td colspan="5" class="text-center text-muted" style="padding:30px">';
      html += '              <div class="skeleton" style="height:20px;margin:4px 0"></div>';
      html += '              <div class="skeleton" style="height:20px;margin:4px 0"></div>';
      html += '              <div class="skeleton" style="height:20px;margin:4px 0"></div>';
      html += '            </td></tr>';
      html += '          </tbody>';
      html += '        </table>';
      html += '      </div>';
      html += '    </div>';

      html += '    <div class="layout-grid-half">';
      html += '      <div class="card">';
      html += '        <div class="card-header">';
      html += '          <h3>\uD83D\uDCCA อุปกรณ์เพิ่มรายเดือน</h3>';
      html += '        </div>';
      html += '        <div class="card-body">';
      html += '          <div class="chart-container" style="height:250px;">';
      html += '            <canvas id="monthlyChart"></canvas>';
      html += '          </div>';
      html += '        </div>';
      html += '      </div>';

      html += '      <div class="card">';
      html += '        <div class="card-header">';
      html += '          <h3>\uD83D\uDCC1 สัดส่วนตามประเภท</h3>';
      html += '        </div>';
      html += '        <div class="card-body">';
      html += '          <div class="chart-container" style="height:250px;">';
      html += '            <canvas id="categoryChart"></canvas>';
      html += '          </div>';
      html += '        </div>';
      html += '      </div>';
      html += '    </div>';

      html += '    <div class="card mt-2">';
      html += '      <div class="card-header">';
      html += '        <h3>\uD83C\uDFE2 สัดส่วนตามแผนก</h3>';
      html += '      </div>';
      html += '      <div class="card-body">';
      html += '        <div class="chart-container" style="height:250px;">';
      html += '          <canvas id="departmentChart"></canvas>';
      html += '        </div>';
      html += '      </div>';
      html += '    </div>';

      html += '  </div>';

      html += '  <div>';
      html += '    <div class="card mb-2">';
      html += '      <div class="card-header">';
      html += '        <h3>\uD83C\uDFAF สัดส่วนสถานะ</h3>';
      html += '      </div>';
      html += '      <div class="card-body text-center">';
      html += '        <div class="donut-chart-container">';
      html += '          <canvas id="statusChart"></canvas>';
      html += '        </div>';
      html += '        <div id="statusLegend" style="margin-top:16px"></div>';
      html += '      </div>';
      html += '    </div>';

      html += '    <div class="card mb-2">';
      html += '      <div class="card-header">';
      html += '        <h3><i class="ph ph-bell-ringing" style="color:var(--warning);margin-right:6px"></i> แจ้งเตือน <span class="badge" style="background:var(--danger);color:white;font-size:11px;padding:2px 8px;border-radius:12px;margin-left:6px;vertical-align:middle" id="alertCount">0</span></h3>';
      html += '      </div>';
      html += '      <div class="card-body" id="alertsContainer">';
      html += '        <p class="text-muted text-sm">กำลังโหลด...</p>';
      html += '      </div>';
      html += '    </div>';

      html += '    <div class="card">';
      html += '      <div class="card-header">';
      html += '        <h3><i class="ph ph-lightning" style="color:var(--warning);margin-right:6px"></i> \u0e01\u0e34\u0e08\u0e01\u0e23\u0e23\u0e21\u0e25\u0e48\u0e32\u0e2a\u0e38\u0e14</h3>';
      html += '        <button class="btn btn-sm btn-outline" onclick="App.navigate(\'audit-log\')" style="font-size:11px;padding:4px 12px">\u0e14\u0e39\u0e17\u0e31\u0e49\u0e07\u0e2b\u0e21\u0e14 <i class="ph ph-arrow-right" style="font-size:12px"></i></button>';
      html += '      </div>';
      html += '      <div class="card-body" id="activityContainer">';
      html += '        <p class="text-muted text-sm">\u0e01\u0e33\u0e25\u0e31\u0e07\u0e42\u0e2b\u0e25\u0e14...</p>';
      html += '      </div>';
      html += '    </div>';
      html += '  </div>';
      html += '</div>';

      return html;
    },

    render: function (stats) {
      // Stats
      document.getElementById('statTotal').textContent = App.formatNumber(stats.total);
      document.getElementById('statActive').textContent = App.formatNumber(stats.active);
      document.getElementById('statRepair').textContent = App.formatNumber(stats.repair);
      document.getElementById('statWarranty').textContent = App.formatNumber(stats.warrantyExpiring);

      const pct = stats.total > 0 ? Math.round(stats.active / stats.total * 100) : 0;
      document.getElementById('statActivePercent').innerHTML = '<span style="color:var(--success)">&#8593; ' + pct + '%</span>';

      // Badge
      const badgeEl = document.getElementById('badgeAssetCount');
      if (badgeEl) badgeEl.textContent = App.formatNumber(stats.total);

      const ticketBadge = document.getElementById('badgeTicketCount');
      if (ticketBadge && stats.openTickets > 0) {
        ticketBadge.textContent = stats.openTickets;
        ticketBadge.style.display = 'inline';
      }

      // Recent Assets Table
      this.allRecentAssets = stats.recentAssets;
      this.allRecentModAssets = stats.recentModAssets;
      this.currentRecentTab = 'added';
      this.currentRecentFilter = 'all';
      this.applyRecentFilters();

      // Status Donut Chart
      this.renderStatusChart(stats);

      // Category Chart
      this.renderCategoryChart(stats.categoryChart);

      // Department Chart
      this.renderDepartmentChart(stats.departmentChart);

      // Monthly Chart
      this.renderMonthlyChart(stats.monthlyStats);

      // Alerts
      this.renderAlerts(stats);

      // Activity Feed
      this.renderActivity(stats.recentActivity);
    },

    renderRecentAssets: function (assets) {
      const tbody = document.getElementById('recentAssetsBody');
      if (!assets || assets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted" style="padding:20px">ไม่มีอุปกรณ์ในสถานะนี้</td></tr>';
        return;
      }

      var html = '';
      for (var i = 0; i < assets.length; i++) {
        var a = assets[i];
        var thumb = a.thumbnail_url || ('https://placehold.co/40x40/E0F7FA/0DCAF0?text=' + encodeURIComponent(a.name.charAt(0)));
        var deptName = a.departments ? a.departments.name : '-';
        var statusBadge = App.getStatusBadge(a.status);
        var assetNameStr = a.name.replace(/'/g, "\\'");
        var assetCodeStr = a.asset_code || '';

        html += '<tr style="cursor:pointer" onclick="App.navigate(\'asset-detail\', {id:\'' + a.id + '\'})">';
        html += '  <td>';
        html += '    <div style="display:flex;align-items:center;gap:10px">';
        html += '      <img src="' + thumb + '" class="thumb" onerror="this.src=\'https://placehold.co/40x40/E0F7FA/0DCAF0?text=\uD83D\uDCE6\'">';
        html += '      <div>';
        html += '        <div class="fw-600">' + a.name + '</div>';
        html += '        <div class="text-xs text-muted">' + assetCodeStr + '</div>';
        html += '      </div>';
        html += '    </div>';
        html += '  </td>';
        html += '  <td>' + deptName + '</td>';
        html += '  <td>' + statusBadge + '</td>';
        html += '  <td><span style="cursor:pointer;font-size:18px" onclick="event.stopPropagation(); showQRPopup(\'' + a.id + '\', \'' + assetNameStr + '\', \'' + assetCodeStr + '\')" title="QR Code">\uD83D\uDCF1</span></td>';
        html += '  <td>';
        html += '    <div style="display:flex;gap:4px">';
        html += '      <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); openEditAssetModal(' + JSON.stringify(a).replace(/"/g, '&quot;') + ')" title="แก้ไข">&#9999;&#65039;</button>';
        html += '      <button class="btn btn-sm btn-outline" onclick="event.stopPropagation(); App.navigate(\'asset-detail\', {id:\'' + a.id + '\'})" title="ดู">\uD83D\uDC41&#65039;</button>';
        html += '    </div>';
        html += '  </td>';
        html += '</tr>';
      }
      tbody.innerHTML = html;
    },

    switchRecentTab: function (tab) {
      this.currentRecentTab = tab;
      document.getElementById('btnTabAdded').className = tab === 'added' ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-outline';
      document.getElementById('btnTabModified').className = tab === 'modified' ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-outline';
      this.applyRecentFilters();
    },

    filterRecent: function (status, btnEl) {
      if (status === 'อื่น') { App.navigate('assets'); return; }
      this.currentRecentFilter = status;

      // Update filter button styles
      if (btnEl) {
        document.querySelectorAll('#dashStatusFilter .btn:not(:last-child)').forEach(function (b) {
          b.className = 'btn btn-sm btn-outline';
        });
        btnEl.className = 'btn btn-sm btn-primary';
      }
      this.applyRecentFilters();
    },

    applyRecentFilters: function () {
      const sourceData = this.currentRecentTab === 'added' ? this.allRecentAssets : this.allRecentModAssets;
      const filtered = this.currentRecentFilter === 'all' ? sourceData :
        sourceData.filter(function (a) { return a.status === DashboardPage.currentRecentFilter; });
      this.renderRecentAssets(filtered);
    },

    renderStatusChart: function (stats) {
      if (this.charts.status) this.charts.status.destroy();
      var ctx = document.getElementById('statusChart');
      if (!ctx) return;

      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      var textMuted = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim() || (isDark ? '#94a3b8' : '#6b7280');
      var gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.05)';
      var tooltipBg = isDark ? 'rgba(15,23,42,0.95)' : 'rgba(15,23,42,0.88)';

      var pct = stats.total > 0 ? Math.round(stats.active / stats.total * 100) : 0;

      // Center text plugin
      var centerTextPlugin = {
        id: 'centerText',
        afterDraw: function (chart) {
          var w = chart.width, h = chart.height, c = chart.ctx;
          c.restore();
          c.font = '700 28px Inter, sans-serif';
          c.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-primary').trim() || '#1a1a2e';
          c.textBaseline = 'middle';
          c.textAlign = 'center';
          c.fillText(pct + '%', w / 2, h / 2 - 8);
          c.font = '500 12px Inter, sans-serif';
          c.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim() || '#94a3b8';
          c.fillText('\u0e43\u0e0a\u0e49\u0e07\u0e32\u0e19\u0e1b\u0e01\u0e15\u0e34', w / 2, h / 2 + 14);
          c.save();
        }
      };

      this.charts.status = new Chart(ctx, {
        type: 'doughnut',
        plugins: [centerTextPlugin],
        data: {
          labels: ['\u0e43\u0e0a\u0e49\u0e07\u0e32\u0e19', '\u0e2a\u0e48\u0e07\u0e0b\u0e48\u0e2d\u0e21', '\u0e2a\u0e33\u0e23\u0e2d\u0e07', '\u0e2d\u0e37\u0e48\u0e19\u0e46'],
          datasets: [{
            data: [stats.active, stats.repair, stats.spare, stats.returned + stats.damaged + stats.disposed],
            backgroundColor: ['#10b981', '#f59e0b', '#6366f1', '#e2e8f0'],
            hoverBackgroundColor: ['#059669', '#d97706', '#4f46e5', '#cbd5e1'],
            borderWidth: 0,
            cutout: '75%',
            borderRadius: 4,
            spacing: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { animateRotate: true, duration: 800, easing: 'easeOutQuart' },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: tooltipBg,
              padding: 12, cornerRadius: 8,
              titleFont: { size: 13, weight: '600', color: '#fff' },
              bodyFont: { size: 12 },
              callbacks: {
                label: function (c) { return ' ' + c.label + ': ' + c.raw + ' \u0e23\u0e32\u0e22\u0e01\u0e32\u0e23'; }
              }
            }
          }
        }
      });

      // Legend
      var legendHtml = '<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:12px">';
      var items = [
        { color: '#10b981', label: '\u0e43\u0e0a\u0e49\u0e07\u0e32\u0e19', val: stats.active },
        { color: '#f59e0b', label: '\u0e0b\u0e48\u0e2d\u0e21', val: stats.repair },
        { color: '#6366f1', label: '\u0e2a\u0e33\u0e23\u0e2d\u0e07', val: stats.spare },
        { color: '#e2e8f0', label: '\u0e2d\u0e37\u0e48\u0e19\u0e46', val: stats.returned + stats.damaged + stats.disposed }
      ];
      items.forEach(function (it) {
        legendHtml += '<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-secondary)">' +
          '<span style="width:8px;height:8px;border-radius:50%;background:' + it.color + ';display:inline-block"></span>' +
          it.label + ' <b>' + it.val + '</b></span>';
      });
      legendHtml += '</div>';
      document.getElementById('statusLegend').innerHTML = legendHtml;
    },

    renderCategoryChart: function (categoryStats) {
      if (this.charts.category) this.charts.category.destroy();
      var ctx = document.getElementById('categoryChart');
      if (!ctx || !categoryStats) return;

      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      var textMuted = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim() || (isDark ? '#94a3b8' : '#6b7280');
      var gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.05)';
      var tooltipBg = isDark ? 'rgba(15,23,42,0.95)' : 'rgba(15,23,42,0.88)';

      var gradient = ctx.getContext('2d').createLinearGradient(0, 0, ctx.width, 0);
      gradient.addColorStop(0, 'rgba(99,102,241,0.8)');
      gradient.addColorStop(1, 'rgba(168,85,247,0.6)');

      this.charts.category = new Chart(ctx, {
        type: 'bar',
        data: {

    renderDepartmentChart: function (departmentStats) {
      if (this.charts.department) this.charts.department.destroy();
      var ctx = document.getElementById('departmentChart');

      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';

      var gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.05)';

      var colors = ['#6366f1', '#8b5cf6', '#a78bfa', '#c084fc', '#d8b4fe', '#7c3aed', '#5b21b6', '#4c1d95'];
      var bgColors = departmentStats.data.map(function (_, i) { return colors[i % colors.length]; });

      this.charts.department = new Chart(ctx, {
        type: 'bar',

          labels: departmentStats.labels,
          datasets: [{
            label: '\u0e08\u0e33\u0e19\u0e27\u0e19',

          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 800, easing: 'easeOutQuart' },

            legend: { display: false },

              backgroundColor: tooltipBg, padding: 10, cornerRadius: 8,

            }
          },
          scales: {
            y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 }, color: textMuted }, grid: { color: gridColor, drawBorder: false } },
            x: { ticks: { font: { size: 10, weight: '500' }, color: textMuted, maxRotation: 45 }, grid: { display: false } }
          }
        }

    },

    renderMonthlyChart: function (monthlyStats) {
      if (this.charts.monthly) this.charts.monthly.destroy();
      var ctx = document.getElementById('monthlyChart');
      if (!ctx) return;

      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      var textMuted = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim() || (isDark ? '#94a3b8' : '#6b7280');
      var gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.05)';
      var tooltipBg = isDark ? 'rgba(15,23,42,0.95)' : 'rgba(15,23,42,0.88)';

      // Create gradient fill for area chart
      var ctxGrad = ctx.getContext('2d');
      var grad = ctxGrad.createLinearGradient(0, 0, 0, 250);
      grad.addColorStop(0, 'rgba(16,185,129,0.35)');

      this.charts.monthly = new Chart(ctx, {

          labels: monthlyStats.map(function (m) { return m.label; }),

            label: '\u0e08\u0e33\u0e19\u0e27\u0e19',
            data: monthlyStats.map(function (m) { return m.count; }),

            backgroundColor: grad,
            borderColor: '#10b981',
            borderWidth: 2.5,
            pointBackgroundColor: '#10b981',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointRadius: 4,
            pointHoverRadius: 6,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 1000, easing: 'easeOutQuart' },
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(15,23,42,0.9)', padding: 12, cornerRadius: 8,
              callbacks: { label: function (c) { return ' \u0e40\u0e1e\u0e34\u0e48\u0e21 ' + c.raw + ' \u0e23\u0e32\u0e22\u0e01\u0e32\u0e23'; } }

            y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 }, color: textMuted }, grid: { color: gridColor, drawBorder: false } },
            x: { ticks: { font: { size: 10 }, color: textMuted, maxRotation: 45 }, grid: { display: false } }
          }
        }
      });
    },

    renderAlerts: function (stats) {
      const container = document.getElementById('alertsContainer');
      let alerts = [];

      if (stats.openTickets > 0) {
        alerts.push({ type: 'danger', icon: 'ph-wrench', count: stats.openTickets, text: '\u0e07\u0e32\u0e19\u0e0b\u0e48\u0e2d\u0e21\u0e04\u0e49\u0e32\u0e07\u0e2d\u0e22\u0e39\u0e48', unit: 'Ticket', sub: '\u0e23\u0e2d\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23', page: 'tickets' });
      }
      if (stats.warrantyExpiring > 0) {
        alerts.push({ type: 'warning', icon: 'ph-shield-warning', count: stats.warrantyExpiring, text: '\u0e1b\u0e23\u0e30\u0e01\u0e31\u0e19\u0e20\u0e31\u0e22\u0e08\u0e30\u0e2b\u0e21\u0e14', unit: '\u0e23\u0e32\u0e22\u0e01\u0e32\u0e23', sub: '\u0e20\u0e32\u0e22\u0e43\u0e19 30 \u0e27\u0e31\u0e19', page: 'warranty' });
      }
      if (stats.repair > 0) {
        alerts.push({ type: 'info', icon: 'ph-package', count: stats.repair, text: '\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c\u0e2a\u0e48\u0e07\u0e0b\u0e48\u0e2d\u0e21', unit: '\u0e23\u0e32\u0e22\u0e01\u0e32\u0e23', sub: '\u0e15\u0e34\u0e14\u0e15\u0e32\u0e21\u0e2a\u0e16\u0e32\u0e19\u0e30', page: 'tickets' });
      }
      if (stats.maintenanceDue > 0) {
        alerts.push({ type: 'warning', icon: 'ph-gear', count: stats.maintenanceDue, text: 'PM \u0e16\u0e36\u0e07\u0e01\u0e33\u0e2b\u0e19\u0e14', unit: '\u0e23\u0e32\u0e22\u0e01\u0e32\u0e23', sub: '\u0e04\u0e25\u0e34\u0e01\u0e40\u0e1e\u0e37\u0e48\u0e2d\u0e14\u0e39\u0e23\u0e32\u0e22\u0e25\u0e30\u0e40\u0e2d\u0e35\u0e22\u0e14', page: 'maintenance' });
      }
      if (stats.overdueCheckouts > 0) {
        alerts.push({ type: 'danger', icon: 'ph-swap', count: stats.overdueCheckouts, text: '\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c\u0e22\u0e37\u0e21\u0e04\u0e49\u0e32\u0e07\u0e04\u0e37\u0e19', unit: '\u0e23\u0e32\u0e22\u0e01\u0e32\u0e23', sub: '\u0e40\u0e25\u0e22\u0e01\u0e33\u0e2b\u0e19\u0e14\u0e04\u0e37\u0e19', page: 'checkouts' });
      }

      document.getElementById('alertCount').textContent = alerts.length;

      if (alerts.length === 0) {
        container.innerHTML = '<div class="alert-empty"><div class="alert-empty-icon"><i class="ph ph-check-circle"></i></div><div class="alert-empty-title">\u0e44\u0e21\u0e48\u0e21\u0e35\u0e41\u0e08\u0e49\u0e07\u0e40\u0e15\u0e37\u0e2d\u0e19</div><div class="alert-empty-sub">\u0e23\u0e30\u0e1a\u0e1a\u0e17\u0e33\u0e07\u0e32\u0e19\u0e1b\u0e01\u0e15\u0e34\u0e14\u0e35</div></div>';
        document.getElementById('alertCount').style.display = 'none';
        return;
      }

      container.innerHTML = '<div class="alerts-list">' + alerts.map(function (a) {
        return '<div class="alert-item ' + a.type + '" onclick="App.navigate(\'' + a.page + '\')">' +
          '<div class="alert-icon-wrap"><i class="ph ' + a.icon + '"></i></div>' +
          '<div class="alert-count">' + a.count + '</div>' +
          '<div class="alert-content"><div class="alert-title">' + a.text + ' ' + a.count + ' ' + a.unit + '</div><div class="alert-sub">' + a.sub + '</div></div>' +
          '<div class="alert-arrow"><i class="ph ph-caret-right"></i></div>' +
          '</div>';
      }).join('') + '</div>';
    },

    renderActivity: function (activities) {
      const container = document.getElementById('activityContainer');
      if (!activities || activities.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:24px 16px;color:var(--text-muted)"><div style="width:48px;height:48px;margin:0 auto 10px;border-radius:50%;background:var(--bg-input);display:flex;align-items:center;justify-content:center"><i class="ph ph-clock-counter-clockwise" style="font-size:20px"></i></div><div style="font-weight:600;font-size:13px;color:var(--text-primary)">\u0e22\u0e31\u0e07\u0e44\u0e21\u0e48\u0e21\u0e35\u0e01\u0e34\u0e08\u0e01\u0e23\u0e23\u0e21</div><div style="font-size:12px">\u0e01\u0e34\u0e08\u0e01\u0e23\u0e23\u0e21\u0e08\u0e30\u0e41\u0e2a\u0e14\u0e07\u0e17\u0e35\u0e48\u0e19\u0e35\u0e48</div></div>';
        return;
      }

      var ACTION_MAP = {
        '\u0e2a\u0e23\u0e49\u0e32\u0e07\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c': { icon: 'ph-plus-circle', bg: 'rgba(46,125,50,0.12)', color: '#2E7D32' },
        '\u0e41\u0e01\u0e49\u0e44\u0e02\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c': { icon: 'ph-pencil-simple', bg: 'rgba(33,150,243,0.12)', color: '#2196F3' },
        '\u0e25\u0e1a\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c': { icon: 'ph-trash', bg: 'rgba(231,76,60,0.12)', color: '#E74C3C' },
        '\u0e40\u0e1e\u0e34\u0e48\u0e21\u0e23\u0e39\u0e1b\u0e20\u0e32\u0e1e': { icon: 'ph-image', bg: 'rgba(156,39,176,0.12)', color: '#9C27B0' },
        '\u0e25\u0e1a\u0e23\u0e39\u0e1b\u0e20\u0e32\u0e1e': { icon: 'ph-image', bg: 'rgba(231,76,60,0.12)', color: '#E74C3C' },
        '\u0e40\u0e0b\u0e47\u0e19\u0e23\u0e31\u0e1a': { icon: 'ph-signature', bg: 'rgba(0,150,136,0.12)', color: '#009688' },
        '\u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01\u0e25\u0e32\u0e22\u0e40\u0e0b\u0e47\u0e19': { icon: 'ph-signature', bg: 'rgba(0,150,136,0.12)', color: '#009688' },
        '\u0e25\u0e1a\u0e25\u0e32\u0e22\u0e40\u0e0b\u0e47\u0e19': { icon: 'ph-eraser', bg: 'rgba(231,76,60,0.12)', color: '#E74C3C' },
        '\u0e2a\u0e23\u0e49\u0e32\u0e07\u0e07\u0e32\u0e19\u0e0b\u0e48\u0e2d\u0e21': { icon: 'ph-wrench', bg: 'rgba(230,81,0,0.12)', color: '#E65100' },
        '\u0e0b\u0e48\u0e2d\u0e21\u0e40\u0e2a\u0e23\u0e47\u0e08': { icon: 'ph-check-circle', bg: 'rgba(46,125,50,0.12)', color: '#2E7D32' },
        '\u0e42\u0e2d\u0e19\u0e22\u0e49\u0e32\u0e22': { icon: 'ph-arrows-left-right', bg: 'rgba(63,81,181,0.12)', color: '#3F51B5' },
        '\u0e22\u0e37\u0e21\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c': { icon: 'ph-hand-grabbing', bg: 'rgba(255,152,0,0.12)', color: '#FF9800' },
        '\u0e04\u0e37\u0e19\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c': { icon: 'ph-arrow-u-down-left', bg: 'rgba(46,125,50,0.12)', color: '#2E7D32' },
        'License': { icon: 'ph-key', bg: 'rgba(121,85,72,0.12)', color: '#795548' },
        'PM': { icon: 'ph-gear', bg: 'rgba(96,125,139,0.12)', color: '#607D8B' },
        '\u0e15\u0e23\u0e27\u0e08\u0e19\u0e31\u0e1a': { icon: 'ph-qr-code', bg: 'rgba(0,188,212,0.12)', color: '#00BCD4' },
        '\u0e15\u0e31\u0e49\u0e07\u0e04\u0e48\u0e32': { icon: 'ph-gear-six', bg: 'rgba(96,125,139,0.12)', color: '#607D8B' }
      };
      var FIELD_LABELS = { 'name': '\u0e0a\u0e37\u0e48\u0e2d\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c', 'asset_code': '\u0e23\u0e2b\u0e31\u0e2a\u0e17\u0e23\u0e31\u0e1e\u0e22\u0e4c\u0e2a\u0e34\u0e19', 'serial_number': 'Serial Number', 'status': '\u0e2a\u0e16\u0e32\u0e19\u0e30', 'location': '\u0e2a\u0e16\u0e32\u0e19\u0e17\u0e35\u0e48', 'department_id': '\u0e41\u0e1c\u0e19\u0e01', 'category_id': '\u0e1b\u0e23\u0e30\u0e40\u0e20\u0e17', 'assigned_user': '\u0e0a\u0e37\u0e48\u0e2d\u0e1c\u0e39\u0e49\u0e43\u0e0a\u0e49', 'user_position': '\u0e15\u0e33\u0e41\u0e2b\u0e19\u0e48\u0e07', 'assigned_email': '\u0e2d\u0e35\u0e40\u0e21\u0e25', 'nas_user': 'User NAS', 'password': '\u0e23\u0e2b\u0e31\u0e2a\u0e1c\u0e48\u0e32\u0e19 NAS', 'price': '\u0e23\u0e32\u0e04\u0e32', 'supplier': '\u0e1c\u0e39\u0e49\u0e08\u0e33\u0e2b\u0e19\u0e48\u0e32\u0e22', 'purchase_date': '\u0e27\u0e31\u0e19\u0e17\u0e35\u0e48\u0e0b\u0e37\u0e49\u0e2d', 'warranty_expiry': '\u0e27\u0e31\u0e19\u0e2b\u0e21\u0e14\u0e1b\u0e23\u0e30\u0e01\u0e31\u0e19', 'po_number': '\u0e40\u0e25\u0e02\u0e17\u0e35\u0e48 PO', 'model': '\u0e23\u0e38\u0e48\u0e19', 'cpu': 'CPU', 'ram': 'RAM', 'storage': 'Storage', 'gpu': 'GPU', 'display': '\u0e2b\u0e19\u0e49\u0e32\u0e08\u0e2d', 'os': 'OS', 'os_key': 'OS License Key', 'ip_address': 'IP Address', 'mac_address': 'MAC Address', 'notes': '\u0e2b\u0e21\u0e32\u0e22\u0e40\u0e2b\u0e15\u0e38', 'thumbnail_url': '\u0e23\u0e39\u0e1b\u0e20\u0e32\u0e1e' };

      container.innerHTML = activities.slice(0, 8).map(function (a, idx) {
        var timeAgo = DashboardPage.timeAgo(a.created_at);
        var action = a.action || '';
        var details = a.details || '-';

        // Translate field keys to Thai labels
        if (details.includes(': ')) {
          var detailsArr = details.split(/,\s*(?=[a-zA-Z0-9_]+:)/);
          details = detailsArr.map(function (d) {
            var colonIdx = d.indexOf(': ');
            if (colonIdx > -1) {
              var rawKey = d.substring(0, colonIdx).trim();
              var val = d.substring(colonIdx + 2);
              var label = FIELD_LABELS[rawKey] || rawKey;
              return label + ': ' + val;
            }
            return d;
          }).join(', ');
        }

        // Find matching icon
        var iconInfo = { icon: 'ph-article', bg: 'var(--primary-light)', color: 'var(--primary)' };
        var actionKeys = Object.keys(ACTION_MAP);
        for (var k = 0; k < actionKeys.length; k++) {
          if (action.indexOf(actionKeys[k]) > -1) { iconInfo = ACTION_MAP[actionKeys[k]]; break; }
        }

        // Truncate long details
        var shortDetails = details.length > 80 ? details.substring(0, 80) + '...' : details;

        // Asset name context
        var assetLabel = '';
        if (a.assets && a.assets.name) {
          assetLabel = '<span style="color:var(--primary);font-weight:600;cursor:pointer" onclick="event.stopPropagation(); App.navigate(\'asset-detail\', {id:\'' + a.asset_id + '\'})">' + a.assets.name + '</span>';
        }

        return '<div class="activity-item" style="animation:alertSlideIn 0.3s ease backwards;animation-delay:' + (idx * 0.05) + 's" title="' + details.replace(/"/g, '&quot;') + '">' +
          '<div class="activity-icon" style="background:' + iconInfo.bg + ';color:' + iconInfo.color + '"><i class="ph ' + iconInfo.icon + '"></i></div>' +
          '<div style="flex:1;min-width:0">' +
          '<div style="font-weight:500;color:var(--text-primary);font-size:12px;margin-bottom:1px">' + action + (assetLabel ? ' <span style="color:var(--text-muted);font-weight:400">\u2192</span> ' + assetLabel : '') + '</div>' +
          '<div style="font-size:11px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + shortDetails + '</div>' +
          '<div class="activity-time">' + timeAgo + '</div>' +
          '</div></div>';
      }).join('');
    },

    timeAgo: function (dateStr) {
      if (!dateStr) return '';
      const now = new Date();
      const d = new Date(dateStr);
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'เมื่อสักครู่';
      if (diff < 3600) return Math.floor(diff / 60) + ' นาทีที่แล้ว';
      if (diff < 86400) return Math.floor(diff / 3600) + ' ชั่วโมงที่แล้ว';
      return Math.floor(diff / 86400) + ' วันที่แล้ว';
    }
  };
</script>
<script>
  /**
   * assets.html &#8212; Asset List Page
   */
  const AssetsPage = {
    currentPage: 1,
    pageSize: 50,
    totalAssets: 0,
    allAssets: [],
    sortColumn: 'created_at',
    sortDirection: 'desc',

    load: function () {
      const container = document.getElementById('page-assets');
      if (!container.innerHTML.includes('assetSearch')) {
        container.innerHTML = this.getTemplate();
      }
      this.fetchAssets();
    },

    sortBy: function (column) {
      if (this.sortColumn === column) {
        this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        this.sortColumn = column;
        this.sortDirection = 'asc';
      }
      this.updateSortIcons();
      this.fetchAssets();
    },

    updateSortIcons: function () {
      const cols = ['name', 'category_id', 'department_id', 'location', 'status', 'warranty_expiry'];
      cols.forEach(col => {
        const icon = document.getElementById('sortIcon-' + col);
        if (icon) {
          if (this.sortColumn === col) {
            icon.className = this.sortDirection === 'asc' ? 'ph ph-caret-up text-primary' : 'ph ph-caret-down text-primary';
          } else {
            icon.className = 'ph ph-caret-up-down text-muted';
          }
        }
      });
    },

    getTemplate: function () {
      return `
      <div class="toolbar" style="background:var(--bg-card); padding:16px; border-radius:var(--border-radius); border:1px solid var(--border-color); box-shadow:var(--shadow-sm); margin-bottom:20px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <div class="search-input" style="flex:1; min-width:250px;">
          <i class="ph ph-magnifying-glass icon"></i>
          <input type="text" id="assetSearch" placeholder="ค้นหาชื่อ / รหัส / Serial..." 
                 onkeydown="if(event.key==='Enter') AssetsPage.fetchAssets()">
        </div>
        <select class="form-control" id="filterDepartment" style="width:auto;min-width:160px" onchange="AssetsPage.fetchAssets()">
          <option value="">แผนกทั้งหมด</option>
        </select>
        <select class="form-control" id="filterStatus" style="width:auto;min-width:140px" onchange="AssetsPage.fetchAssets()">
          <option value="">สถานะทั้งหมด</option>
          <option value="ใช้งาน">ใช้งาน</option>
          <option value="ส่งซ่อม">ส่งซ่อม</option>
          <option value="ส่งคืน">ส่งคืน</option>

        <button class="btn btn-outline" style="padding:10px 16px; display:flex; align-items:center; gap:6px;" onclick="AssetsPage.resetFilters()">

      </div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div class="text-sm text-muted" id="assetCountInfo" style="font-weight:500;"></div>
        <button class="btn btn-outline" style="display:flex; align-items:center; gap:6px;" onclick="openModal('exportModal')">
          <i class="ph ph-export"></i> Export Data
        </button>
      </div>

      <div class="bulk-actions" id="bulkActions" style="margin-bottom:20px; background:var(--bg-card); border:1px solid var(--border-color); box-shadow:var(--shadow); border-radius:var(--border-radius-sm); padding:12px 20px; display:none; align-items:center; gap:12px; animation: slideDown 0.3s ease;">
        <span id="selectedCount" class="fw-600 text-primary">เลือก 0 รายการ</span>
        <div style="width:1px; height:24px; background:var(--border-color); margin:0 8px;"></div>
        <button class="btn btn-sm btn-outline" onclick="AssetsPage.bulkQR()"><i class="ph ph-qr-code"></i> สร้าง QR</button>
        <button class="btn btn-sm btn-outline" onclick="AssetsPage.bulkTransfer()"><i class="ph ph-arrows-left-right"></i> โอนย้าย</button>
        <div style="flex:1"></div>
        <button class="btn btn-sm btn-danger" onclick="AssetsPage.bulkDelete()"><i class="ph ph-trash"></i> ลบที่เลือก</button>
        <button class="btn btn-sm btn-outline" onclick="AssetsPage.clearSelection()"><i class="ph ph-x"></i> ยกเลิก</button>
      </div>

      <input type="file" id="importCsvInput" accept=".csv,.xlsx" style="display:none" onchange="AssetsPage.importCsv(event)">

      <div class="card" style="box-shadow:var(--shadow-lg); border:none; border-radius:var(--border-radius-lg);">
        <div class="table-container" style="border-radius:var(--border-radius-lg); overflow:hidden;">
          <table style="width:100%; border-collapse:collapse;">
            <thead>
              <tr style="background:var(--bg-input); border-bottom:2px solid var(--border-color);">
                <th style="width:40px; padding:16px;"><input type="checkbox" id="selectAll" class="custom-checkbox" onchange="AssetsPage.toggleSelectAll(this.checked)"></th>
                <th style="padding:16px; font-weight:600; color:var(--text-secondary); cursor:pointer;" onclick="AssetsPage.sortBy('name')">ชื่ออุปกรณ์ <i id="sortIcon-name" class="ph ph-caret-up-down text-muted"></i></th>
                <th style="padding:16px; font-weight:600; color:var(--text-secondary); cursor:pointer;" onclick="AssetsPage.sortBy('category_id')">ประเภท <i id="sortIcon-category_id" class="ph ph-caret-up-down text-muted"></i></th>
                <th style="padding:16px; font-weight:600; color:var(--text-secondary); cursor:pointer;" onclick="AssetsPage.sortBy('department_id')">แผนก <i id="sortIcon-department_id" class="ph ph-caret-up-down text-muted"></i></th>
                <th style="padding:16px; font-weight:600; color:var(--text-secondary); cursor:pointer;" onclick="AssetsPage.sortBy('location')">สถานที่ <i id="sortIcon-location" class="ph ph-caret-up-down text-muted"></i></th>
                <th style="padding:16px; font-weight:600; color:var(--text-secondary); cursor:pointer;" onclick="AssetsPage.sortBy('status')">สถานะ <i id="sortIcon-status" class="ph ph-caret-up-down text-muted"></i></th>
                <th style="padding:16px; font-weight:600; color:var(--text-secondary); cursor:pointer;" onclick="AssetsPage.sortBy('warranty_expiry')">ประกัน <i id="sortIcon-warranty_expiry" class="ph ph-caret-up-down text-muted"></i></th>
                <th style="padding:16px; font-weight:600; color:var(--text-secondary); text-align:right;">จัดการ</th>
              </tr>
            </thead>
            <tbody id="assetsTableBody">
              <tr><td colspan="8" class="text-center text-muted" style="padding:60px;"><div class="spinner" style="margin:0 auto 16px;"></div>กำลังโหลดข้อมูล...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="pagination" style="margin-top:24px; background:var(--bg-card); padding:16px 24px; border-radius:var(--border-radius); box-shadow:var(--shadow-sm); border:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
        <div style="display:flex; align-items:center; gap:16px;">
          <select class="form-control" id="pageSizeSelect" style="width:auto;" onchange="AssetsPage.changePageSize(this.value)">
            <option value="10">10 รายการ</option>
            <option value="20">20 รายการ</option>
            <option value="50">50 รายการ</option>
            <option value="100">100 รายการ</option>
          </select>
          <div class="pagination-info" id="paginationInfo" style="font-weight:500;"></div>
        </div>
        <div class="pagination-buttons" id="paginationButtons" style="display:flex; gap:6px;"></div>
      </div>
    `;
    },

    fetchAssets: async function () {
      this.updateSortIcons();
      App.showLoading(true);

      const search = document.getElementById('assetSearch') ? document.getElementById('assetSearch').value : '';
      const status = document.getElementById('filterStatus') ? document.getElementById('filterStatus').value : '';
      const deptId = document.getElementById('filterDepartment') ? document.getElementById('filterDepartment').value : '';
      const catId = document.getElementById('filterCategory') ? document.getElementById('filterCategory').value : '';

      const offset = (this.currentPage - 1) * this.pageSize;
      const order = this.sortColumn ? (this.sortColumn + '.' + this.sortDirection) : 'created_at.desc';

      let url = window.CONFIG.supabaseUrl + '/rest/v1/assets?select=' + encodeURIComponent('*, categories(name, icon), departments(name)');
      let filters = [];

      if (search) {
        filters.push('or=(name.ilike.*' + search + '*,asset_code.ilike.*' + search + '*,serial_number.ilike.*' + search + '*)');
      }
      if (status) filters.push('status=eq.' + status);
      if (catId) filters.push('category_id=eq.' + catId);
      if (deptId) filters.push('department_id=eq.' + deptId);

      if (filters.length > 0) {
        url += '&' + filters.join('&');
      }
      url += '&order=' + encodeURIComponent(order);
      url += '&limit=' + this.pageSize;
      url += '&offset=' + offset;

      try {
        const response = await fetch(url, {
          method: 'GET',
          headers: {
            'apikey': window.CONFIG.supabaseKey,
            'Authorization': 'Bearer ' + window.CONFIG.supabaseKey,
            'Content-Type': 'application/json',
            'Prefer': 'count=exact'
          }
        });

        if (!response.ok) throw new Error('Network response was not ok');

        const data = await response.json();

        // Extract total count from headers
        const contentRange = response.headers.get('content-range') || '';
        const total = parseInt(contentRange.split('/')[1] || data.length || 0, 10);

        AssetsPage.allAssets = data || [];
        AssetsPage.totalAssets = total;

        AssetsPage.renderTable();
        AssetsPage.renderPagination();
      } catch (err) {
        console.error('Fetch error:', err);
        App.toast('ไม่สามารถโหลดข้อมูล', 'error');
      } finally {
        App.showLoading(false);
      }
    },

    renderTable: function () {
      const tbody = document.getElementById('assetsTableBody');
      if (!this.allAssets || this.allAssets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted" style="padding:40px">ไม่พบอุปกรณ์</td></tr>';
        document.getElementById('assetCountInfo').textContent = '';
        return;
      }

      document.getElementById('assetCountInfo').textContent = 'แสดง ' + this.allAssets.length + ' จาก ' + this.totalAssets + ' รายการ';

      tbody.innerHTML = this.allAssets.map(function (a) {
        const isSelected = App.selectedAssets.indexOf(a.id) !== -1;
        const warrantyStr = a.warranty_expiry ? App.formatDate(a.warranty_expiry) : '-';
        let warrantyClass = '';
        if (a.warranty_expiry) {
          const exp = new Date(a.warranty_expiry);
          const now = new Date();
          const thirtyDays = new Date(now.getTime() + 30 * 86400000);
          if (exp < now) warrantyClass = 'text-danger fw-600';
          else if (exp < thirtyDays) warrantyClass = 'text-warning fw-600';
          else warrantyClass = 'text-success';
        }

        const fallbackChar = a.name ? encodeURIComponent(a.name.charAt(0)) : 'A';
        const imgFallBackUrl = 'https://placehold.co/40x40/E0F7FA/0DCAF0?text=' + fallbackChar;

        return '<tr class="' + (isSelected ? 'selected' : '') + '" data-id="' + a.id + '" style="border-bottom:1px solid var(--border-color); transition:all 0.2s;">' +
          '<td style="padding:16px;"><input type="checkbox" class="custom-checkbox" ' + (isSelected ? 'checked' : '') + ' onchange="AssetsPage.toggleSelect(\'' + a.id + '\', this.checked)"></td>' +
          '<td style="cursor:pointer; padding:16px;" onclick="App.navigate(\'asset-detail\', {id:\'' + a.id + '\'})">' +
          '<div style="display:flex;align-items:center;gap:12px">' +
          '<img src="' + (a.thumbnail_url || imgFallBackUrl) + '" style="width:40px;height:40px;border-radius:10px;object-fit:cover;box-shadow:var(--shadow-sm);" onerror="this.src=\'https://placehold.co/40x40/E0F7FA/0DCAF0?text=IT\'">' +
          '<div>' +
          '<div class="fw-600 text-primary" style="font-size:14px;">' + a.name + '</div>' +
          '<div class="text-xs text-muted" style="margin-top:2px;">' + (a.asset_code || '') + (a.serial_number ? '<span style="margin:0 6px;">&bull;</span>' + a.serial_number : '') + '</div>' +
          '</div>' +
          '</div>' +
          '</td>' +
          '<td style="padding:16px; color:var(--text-secondary);">' + (a.categories ? a.categories.name : '-') + '</td>' +
          '<td style="padding:16px; color:var(--text-secondary);">' + (a.departments ? a.departments.name : '-') + '</td>' +
          '<td style="padding:16px; color:var(--text-secondary);">' + (a.location || '-') + '</td>' +
          '<td style="padding:16px;">' + App.getStatusBadge(a.status) + '</td>' +
          '<td class="' + warrantyClass + ' text-sm" style="padding:16px;">' + warrantyStr + '</td>' +
          '<td style="padding:16px; text-align:right;">' +
          '<div style="display:flex;gap:6px;justify-content:flex-end;">' +
          '<button class="btn btn-sm btn-outline" style="padding:6px 10px; border-radius:6px;" onclick="showQRPopup(\'' + a.id + '\', \'' + a.name.replace(/'/g, "\\'") + '\', \'' + (a.asset_code || '') + '\')" title="QR Code"><i class="ph ph-qr-code text-lg"></i></button>' +
          '<button class="btn btn-sm btn-outline" style="padding:6px 10px; border-radius:6px;" onclick="App.navigate(\'asset-detail\', {id:\'' + a.id + '\'})" title="ดูรายละเอียด"><i class="ph ph-eye text-lg"></i></button>' +
          '<button class="btn btn-sm btn-outline" style="padding:6px 10px; border-radius:6px;" onclick="openEditAssetModal(' + JSON.stringify(a).replace(/"/g, '&quot;') + ')" title="แก้ไข"><i class="ph ph-pencil-simple text-lg"></i></button>' +
          '<button class="btn btn-sm btn-outline" style="padding:6px 10px; border-radius:6px; color:var(--danger); border-color:transparent;" onmouseover="this.style.background=\'#FFEBEB\'; this.style.borderColor=\'var(--danger)\';" onmouseout="this.style.background=\'transparent\'; this.style.borderColor=\'transparent\';" onclick="AssetsPage.deleteOne(\'' + a.id + '\',\'' + a.name.replace(/'/g, "\\\'") + '\')" title="ลบ"><i class="ph ph-trash text-lg"></i></button>' +
          '</div>' +
          '</td>' +
          '</tr>';
      }).join('');
    },

    renderPagination: function () {
      const totalPages = Math.ceil(this.totalAssets / this.pageSize);
      const info = document.getElementById('paginationInfo');
      info.textContent = 'หน้า ' + this.currentPage + ' จาก ' + totalPages + ' (' + this.totalAssets + ' รายการ)';

      const psSelect = document.getElementById('pageSizeSelect');
      if (psSelect) psSelect.value = this.pageSize;

      const buttons = document.getElementById('paginationButtons');
      let html = '';
      html += '<button ' + (this.currentPage <= 1 ? 'disabled' : '') + ' onclick="AssetsPage.goPage(' + (this.currentPage - 1) + ')">&#8249;</button>';

      for (let i = 1; i <= Math.min(totalPages, 7); i++) {
        let pg = i;
        if (totalPages > 7 && i > 3 && i < 7) {
          pg = this.currentPage - 3 + i;
          if (pg < 1) pg = i;
          if (pg > totalPages) pg = totalPages - (7 - i);
        }
        html += '<button class="' + (pg === this.currentPage ? 'active' : '') + '" onclick="AssetsPage.goPage(' + pg + ')">' + pg + '</button>';
      }

      html += '<button ' + (this.currentPage >= totalPages ? 'disabled' : '') + ' onclick="AssetsPage.goPage(' + (this.currentPage + 1) + ')">&#8250;</button>';
      buttons.innerHTML = html;
    },

    goPage: function (page) {
      this.currentPage = page;
      this.fetchAssets();
    },

    changePageSize: function (size) {
      this.pageSize = parseInt(size, 10) || 50;
      this.currentPage = 1;
      this.fetchAssets();
    },

    resetFilters: function () {
      document.getElementById('assetSearch').value = '';
      document.getElementById('filterStatus').value = '';
      document.getElementById('filterDepartment').value = '';
      document.getElementById('filterCategory').value = '';
      this.currentPage = 1;
      this.fetchAssets();
    },

    toggleSelect: function (id, checked) {
      if (checked) {
        if (App.selectedAssets.indexOf(id) === -1) App.selectedAssets.push(id);
      } else {
        App.selectedAssets = App.selectedAssets.filter(function (x) { return x !== id; });
      }
      this.updateBulkActions();
    },

    toggleSelectAll: function (checked) {
      if (checked) {
        App.selectedAssets = this.allAssets.map(function (a) { return a.id; });
      } else {
        App.selectedAssets = [];
      }
      this.renderTable();
      this.updateBulkActions();
    },

    clearSelection: function () {
      App.selectedAssets = [];
      document.getElementById('selectAll').checked = false;
      this.renderTable();
      this.updateBulkActions();
    },

    updateBulkActions: function () {
      const bar = document.getElementById('bulkActions');
      if (App.selectedAssets.length > 0) {
        bar.classList.add('show');
        document.getElementById('selectedCount').textContent = 'เลือก ' + App.selectedAssets.length + ' รายการ';
      } else {
        bar.classList.remove('show');
      }
    },

    deleteOne: function (id, name) {
      showConfirm('ต้องการลบ "' + name + '" ใช่หรือไม่?', function () {
        App.showLoading(true);
        google.script.run
          .withSuccessHandler(function () {
            App.showLoading(false);
            App.toast('ลบเรียบร้อย', 'success');
            AssetsPage.fetchAssets();
          })
          .withFailureHandler(function (err) {
            App.showLoading(false);
            App.toast('เกิดข้อผิดพลาด', 'error');
          })
          .deleteAsset(id);
      });
    },

    bulkDelete: function () {
      showConfirm('ต้องการลบ ' + App.selectedAssets.length + ' รายการ ใช่หรือไม่?', function () {
        App.showLoading(true);
        google.script.run
          .withSuccessHandler(function () {
            App.showLoading(false);
            App.toast('ลบเรียบร้อย', 'success');
            App.selectedAssets = [];
            AssetsPage.fetchAssets();
            AssetsPage.updateBulkActions();
          })
          .withFailureHandler(function (err) {
            App.showLoading(false);
            App.toast('เกิดข้อผิดพลาด', 'error');
          })
          .deleteAssets(App.selectedAssets);
      });
    },

    bulkQR: function () {
      App.navigate('qrcode');
      // QR page will use App.selectedAssets
    },

    bulkTransfer: function () {
      App.navigate('transfers');
    },

    importCsv: function (event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const wb = XLSX.read(e.target.result, { type: 'binary' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const data = XLSX.utils.sheet_to_json(ws);

          if (data.length === 0) {
            App.toast('ไฟล์ว่างเปล่า', 'warning');
            return;
          }

          App.showLoading(true);
          google.script.run
            .withSuccessHandler(function (result) {
              App.showLoading(false);
              App.toast('นำเข้าสำเร็จ ' + result.imported + ' รายการ', 'success');
              if (result.errors.length > 0) {
                App.toast('มี ' + result.errors.length + ' รายการที่ผิดพลาด', 'warning');
              }
              AssetsPage.fetchAssets();
            })
            .withFailureHandler(function (err) {
              App.showLoading(false);
              App.toast('เกิดข้อผิดพลาด: ' + err.message, 'error');
            })
            .importAssets(data);
        } catch (err) {
          App.toast('ไม่สามารถอ่านไฟล์: ' + err.message, 'error');
        }
      };
      reader.readAsBinaryString(file);
      event.target.value = '';
    }
  };
</script>
<script>
  /**
   * asset-detail.html &#8212; Asset Detail/Edit Page
   */
  const AssetDetailPage = {
    currentAsset: null,

    load: async function (assetId) {
      if (!assetId && this.currentAsset) assetId = this.currentAsset.id;
      if (!assetId) { App.navigate('assets'); return; }

      const container = document.getElementById('page-asset-detail');
      container.innerHTML = '<div style="text-align:center;padding:60px"><div class="spinner" style="margin:0 auto"></div><p class="mt-1 text-muted">กำลังโหลด...</p></div>';
      App.showLoading(true);

      try {
        const [assetsReq, imagesReq, signaturesReq, auditLogReq] = await Promise.all([
          App.supabaseSelect('assets', '*, categories(name, icon), departments(name)', 'id=eq.' + assetId),
          App.supabaseSelect('asset_images', '*', 'asset_id=eq.' + assetId),
          App.supabaseSelect('signatures', '*', 'asset_id=eq.' + assetId, 'signed_at.desc'),
          App.supabaseSelect('audit_log', '*', 'asset_id=eq.' + assetId, 'created_at.desc', 50)
        ]);

        if (!assetsReq || assetsReq.length === 0) {
          container.innerHTML = '<div style="text-align:center;padding:60px"><p class="text-danger">&#10060; ไม่พบข้อมูลอุปกรณ์</p><button class="btn btn-outline mt-2" onclick="App.navigate(\'assets\')">&#8592; กลับ</button></div>';
          return;
        }

        const asset = assetsReq[0];
        asset.images = imagesReq || [];
        asset.signatures = signaturesReq || [];
        asset.auditLog = auditLogReq || [];

        AssetDetailPage.currentAsset = asset;

        try {
          AssetDetailPage.render(asset);
        } catch (e) {
          console.error('Render error:', e);
          container.innerHTML = '<div style="text-align:center;padding:60px"><p class="text-danger">&#10060; เกิดข้อผิดพลาดในการแสดงผล</p><p class="text-muted text-sm">' + e.message + '</p><button class="btn btn-outline mt-2" onclick="App.navigate(\'assets\')">&#8592; กลับ</button></div>';
        }
      } catch (err) {
        console.error('AssetDetail load error:', err);
        container.innerHTML = '<div style="text-align:center;padding:60px"><p class="text-danger">&#10060; ไม่สามารถโหลดอุปกรณ์ได้</p><p class="text-muted text-sm">' + (err.message || err) + '</p><button class="btn btn-outline mt-2" onclick="App.navigate(\'assets\')">&#8592; กลับ</button></div>';
      } finally {
        App.showLoading(false);
      }
    },

    render: function (asset) {
      const container = document.getElementById('page-asset-detail');

      var html = '';
      html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;background:var(--bg-card);padding:16px 24px;border-radius:var(--border-radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--border-color);">';
      html += '  <button class="btn btn-outline btn-icon" style="width:40px;height:40px;border-radius:50%;" onclick="App.navigate(\'assets\')">';
      html += '    <i class="ph ph-arrow-left" style="font-size:20px;"></i>';
      html += '  </button>';
      html += '  <div style="flex:1">';
      html += '    <h2 style="font-size:22px;font-weight:700;color:var(--text-primary);margin-bottom:4px;">' + asset.name + '</h2>';
      html += '    <div style="display:flex;align-items:center;gap:8px;">';
      html += '      <span class="badge" style="background:var(--primary-light);color:var(--primary-dark);padding:4px 10px;border-radius:6px;font-weight:600;font-size:12px;">';
      html += '        <i class="ph ph-barcode" style="margin-right:4px;"></i>' + (asset.asset_code || 'ไม่มีรหัส');
      html += '      </span>';
      if (asset.serial_number) {
        html += '      <span class="text-muted text-sm" style="display:flex;align-items:center;"><i class="ph ph-hash" style="margin-right:4px;"></i>SN: ' + asset.serial_number + '</span>';
      }
      html += '    </div>';
      html += '  </div>';
      html += '  <div class="btn-group" style="gap:10px;">';
      html += '    <button class="btn btn-primary" onclick="openEditAssetModal(AssetDetailPage.currentAsset)">';
      html += '      <i class="ph ph-pencil-simple"></i> แก้ไขข้อมูล';
      html += '    </button>';
      html += '    <button class="btn btn-outline" style="border-color:var(--info);color:var(--info);" onclick="openSignatureModal(\'' + asset.id + '\')">';
      html += '      <i class="ph ph-signature"></i> เซ็นรับอุปกรณ์';
      html += '    </button>';
      html += '    <button class="btn btn-outline" onclick="openModal(\'exportModal\')">';
      html += '      <i class="ph ph-export"></i> Export';
      html += '    </button>';
      html += '    <button class="btn btn-danger btn-icon" onclick="AssetDetailPage.deleteThis()" title="ลบข้อมูล">';
      html += '      <i class="ph ph-trash" style="font-size:18px;"></i>';
      html += '    </button>';
      html += '  </div>';
      html += '</div>';
