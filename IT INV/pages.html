<script>
  /**
   * reports.html &#8212; Reports Page
   */
  const ReportsPage = {
    charts: {},

    load: function () {
      const container = document.getElementById('page-reports');
      container.innerHTML = this.getTemplate();
      this.fetchData();
    },

    getTemplate: function () {
      return `
      <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="openModal('exportModal')">\uD83D\uDCE4 Export ข้อมูล</button>
        <button class="btn btn-outline" onclick="ReportsPage.printReport()">\uD83D\uDDA8&#65039; พิมพ์รายงาน</button>
      </div>

      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px">
        <div class="card">
          <div class="card-header"><h3>\uD83D\uDCCA สถานะอุปกรณ์</h3></div>
          <div class="card-body"><div class="chart-container"><canvas id="reportStatusChart"></canvas></div></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>\uD83C\uDFF7&#65039; ตามประเภท</h3></div>
          <div class="card-body"><div class="chart-container"><canvas id="reportCategoryChart"></canvas></div></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>\uD83C\uDFE2 ตามแผนก</h3></div>
          <div class="card-body"><div class="chart-container"><canvas id="reportDeptChart"></canvas></div></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>\uD83D\uDCB0 มูลค่ารวมตามสถานะ</h3></div>
          <div class="card-body"><div class="chart-container"><canvas id="reportValueChart"></canvas></div></div>
        </div>
      </div>

      
      <div class="card mt-2">
        <div class="card-header"><h3>\uD83D\uDCCB สรุปรวม</h3></div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px">
            <div>
              <div class="text-sm text-muted">จำนวนอุปกรณ์ทั้งหมด</div>
              <div class="fw-600" style="font-size:20px" id="reportTotalCount">-</div>
            </div>
            <div>
              <div class="text-sm text-muted">มูลค่ารวม</div>
              <div class="fw-600" style="font-size:20px" id="reportTotalValue">-</div>
            </div>
            <div>
              <div class="text-sm text-muted">จำนวนประเภท</div>
              <div class="fw-600" style="font-size:20px" id="reportCategoryCount">-</div>
            </div>
            <div>
              <div class="text-sm text-muted">จำนวนแผนก</div>
              <div class="fw-600" style="font-size:20px" id="reportDeptCount">-</div>
            </div>
          </div>
        </div>
      </div>
    `;
    },

    fetchData: async function () {
      App.showLoading(true);
      try {
        const [allAssets, recentAssets] = await Promise.all([
          App.supabaseSelect('assets', 'id,status,warranty_expiry,created_at,price,categories(name),departments(name)'),
          App.supabaseSelect('assets', '*, categories(name, icon), departments(name)', null, 'created_at.desc', 8)
        ]);

        const total = allAssets.length;
        let active = 0, repair = 0, returned = 0, spare = 0, damaged = 0, disposed = 0;
        let warrantyExpiring = 0;
        let totalValue = 0;

        const now = new Date();
        const thirtyDaysLater = new Date(now.getTime() + 30 * 24 * 60 * 60 * 1000);

        const categoryStats = {};
        const departmentStats = {};

        allAssets.forEach(function (a) {
          switch (a.status) {
            case 'ใช้งาน': active++; break;
            case 'ส่งซ่อม': repair++; break;
            case 'ส่งคืน': returned++; break;
            case 'สำรอง': spare++; break;
            case 'ชำรุด': damaged++; break;
            case 'จำหน่าย': disposed++; break;
          }
          if (a.price) totalValue += parseFloat(a.price) || 0;
          if (a.warranty_expiry) {
            const expiry = new Date(a.warranty_expiry);
            if (expiry > now && expiry <= thirtyDaysLater) {
              warrantyExpiring++;
            }
          }
          const catName = (a.categories && a.categories.name) ? a.categories.name : 'ไม่ระบุ';
          if (!categoryStats[catName]) categoryStats[catName] = 0;
          categoryStats[catName]++;

          const deptName = (a.departments && a.departments.name) ? a.departments.name : 'ไม่ระบุ';
          if (!departmentStats[deptName]) departmentStats[deptName] = 0;
          departmentStats[deptName]++;
        });

        const stats = {
          total: total,
          active: active,
          repair: repair,
          returned: returned,
          spare: spare,
          damaged: damaged,
          disposed: disposed,
          warrantyExpiring: warrantyExpiring,
          statusChart: {
            labels: ['ใช้งาน', 'ส่งซ่อม', 'สำรอง', 'อื่น'],
            data: [active, repair, spare, returned + damaged + disposed]
          },
          categoryChart: { labels: Object.keys(categoryStats), data: Object.values(categoryStats) },
          departmentChart: { labels: Object.keys(departmentStats), data: Object.values(departmentStats) },
          recentAssets: recentAssets,
          totalValue: totalValue
        };

        ReportsPage.renderCharts(stats);
      } catch (err) {
        App.toast('ไม่สามารถโหลดข้อมูลรายงาน', 'error');
        console.error(err);
      } finally {
        App.showLoading(false);
      }
    },

    renderCharts: function (stats) {
      // Summary — compute total value from all assets
      document.getElementById('reportTotalCount').textContent = App.formatNumber(stats.total);

      // Use recentAssets if no totalValue is directly available
      var totalVal = 0;
      if (stats.recentAssets) {
        // We need all assets for value — fetch separately if needed
      }
      document.getElementById('reportTotalValue').textContent = '\u0e3f' + App.formatNumber(stats.totalValue || 0);
      document.getElementById('reportCategoryCount').textContent = stats.categoryChart ? stats.categoryChart.labels.length : App.categories.length;
      document.getElementById('reportDeptCount').textContent = stats.departmentChart ? stats.departmentChart.labels.length : App.departments.length;

      // Status Chart
      if (this.charts.status) this.charts.status.destroy();
      this.charts.status = new Chart(document.getElementById('reportStatusChart'), {
        type: 'pie',
        data: {
          labels: ['\u0e43\u0e0a\u0e49\u0e07\u0e32\u0e19', '\u0e2a\u0e48\u0e07\u0e0b\u0e48\u0e2d\u0e21', '\u0e2a\u0e33\u0e23\u0e2d\u0e07', '\u0e2d\u0e37\u0e48\u0e19\u0e46'],
          datasets: [{
            data: [stats.active, stats.repair, stats.spare, stats.returned + stats.damaged + stats.disposed],
            backgroundColor: ['#10b981', '#f59e0b', '#6366f1', '#e2e8f0'],
            hoverBackgroundColor: ['#059669', '#d97706', '#4f46e5', '#cbd5e1'],
            borderWidth: 0
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
      });

      // Category Chart — use categoryChart from getDashboardStats
      if (this.charts.category) this.charts.category.destroy();
      var catLabels = stats.categoryChart ? stats.categoryChart.labels : [];
      var catData = stats.categoryChart ? stats.categoryChart.data : [];

      var ctxCat = document.getElementById('reportCategoryChart').getContext('2d');
      var gradientCat = ctxCat.createLinearGradient(0, 0, 0, 300);
      gradientCat.addColorStop(0, 'rgba(99, 102, 241, 0.8)');
      gradientCat.addColorStop(1, 'rgba(168, 85, 247, 0.8)');

      var isDark2 = document.documentElement.getAttribute('data-theme') === 'dark';
      var textMuted2 = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim() || (isDark2 ? '#94a3b8' : '#6b7280');
      var gridColor2 = isDark2 ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.05)';
      var tooltipBg2 = isDark2 ? 'rgba(15,23,42,0.95)' : 'rgba(15,23,42,0.88)';
      var legendColor2 = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || (isDark2 ? '#cbd5e1' : '#475569');

      this.charts.category = new Chart(ctxCat, {
        type: 'bar',
        data: {
          labels: catLabels,
          datasets: [{
            label: '\u0e08\u0e33\u0e19\u0e27\u0e19', data: catData,
            backgroundColor: gradientCat, borderRadius: 6, maxBarThickness: 40
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { precision: 0, color: textMuted2 }, grid: { color: gridColor2 } },
            x: { ticks: { color: textMuted2 }, grid: { display: false } }
          }
        }
      });

      // Department Chart — use departmentChart from getDashboardStats
      if (this.charts.dept) this.charts.dept.destroy();
      var deptLabels = stats.departmentChart ? stats.departmentChart.labels : [];
      var deptData = stats.departmentChart ? stats.departmentChart.data : [];

      var ctxDept = document.getElementById('reportDeptChart').getContext('2d');
      var gradientDept = ctxDept.createLinearGradient(0, 0, 0, 300);
      gradientDept.addColorStop(0, 'rgba(16, 185, 129, 0.8)');
      gradientDept.addColorStop(1, 'rgba(20, 184, 166, 0.8)');

      this.charts.dept = new Chart(ctxDept, {
        type: 'bar',
        data: {
          labels: deptLabels,
          datasets: [{
            label: '\u0e08\u0e33\u0e19\u0e27\u0e19', data: deptData,
            backgroundColor: gradientDept, borderRadius: 6, maxBarThickness: 40
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { precision: 0, color: textMuted2 }, grid: { color: gridColor2 } },
            x: { ticks: { color: textMuted2 }, grid: { display: false } }
          }
        }
      });

      // Status distribution chart
      if (this.charts.value) this.charts.value.destroy();
      this.charts.value = new Chart(document.getElementById('reportValueChart'), {
        type: 'doughnut',
        data: {
          labels: stats.statusChart ? stats.statusChart.labels : ['\u0e43\u0e0a\u0e49\u0e07\u0e32\u0e19', '\u0e2a\u0e48\u0e07\u0e0b\u0e48\u0e2d\u0e21', '\u0e2a\u0e33\u0e23\u0e2d\u0e07', '\u0e2d\u0e37\u0e48\u0e19\u0e46'],
          datasets: [{
            data: stats.statusChart ? stats.statusChart.data : [stats.active, stats.repair, stats.spare, stats.returned + stats.damaged + stats.disposed],
            backgroundColor: ['#2ECC71', '#F39C12', '#3498DB', '#E0E0E0'], borderWidth: 0, cutout: '65%'
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: legendColor2, padding: 12, boxWidth: 12 }
            }
          }
        }
      });
    },

    printReport: function () {
      window.print();
    }
  };
</script>
<script>
  /**
   * audit-log.html &#8212; Audit Log Page
   */
  const AuditLogPage = {
    allLogs: [],
    sortColumn: 'created_at',
    sortDirection: 'desc',

    load: function () {
      const container = document.getElementById('page-audit-log');
      container.innerHTML = this.getTemplate();
      App.makeTHSortable('page-audit-log', 'AuditLogPage', [
        { col: 'created_at' }, { col: 'performed_by' }, { col: 'action' }, null, { col: 'asset_id' }
      ]);
      this.fetchLogs();
    },

    sortBy: function (column) {
      if (this.sortColumn === column) {
        this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        this.sortColumn = column;
        this.sortDirection = 'asc';
      }
      App.updateSortIcons('AuditLogPage', ['created_at', 'performed_by', 'action', 'asset_id'], this.sortColumn, this.sortDirection);
      this.applyFilters();
    },

    getTemplate: function () {
      return `
      <div class="card mb-3" style="box-shadow:var(--shadow-sm);border:none;">
        <div class="card-body" style="padding:16px 20px;">
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
            <div style="flex:1;min-width:200px;position:relative;">
              <i class="ph ph-magnifying-glass" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);"></i>
              <input type="text" class="form-control" id="auditSearch" placeholder="ค้นหารายละเอียด..." onkeyup="AuditLogPage.applyFilters()" style="padding-left:36px;border-radius:8px;">
            </div>
            <select class="form-control" id="auditActionFilter" style="width:auto;min-width:180px;border-radius:8px;" onchange="AuditLogPage.applyFilters()">
              <option value="">การกระทำทั้งหมด</option>
              <option value="เพิ่มอุปกรณ์">เพิ่มอุปกรณ์</option>
              <option value="แก้ไขอุปกรณ์">แก้ไขอุปกรณ์</option>
              <option value="ลบ">ลบ / จำหน่าย</option>
              <option value="โอนย้าย">โอนย้ายทรัพย์สิน</option>
              <option value="เซ็นรับ">เซ็นรับอุปกรณ์</option>
              <option value="งานซ่อม">งานซ่อม</option>
              <option value="PM">PM (บำรุงรักษา)</option>
              <option value="ยืม">ยืม-คืนอุปกรณ์</option>
              <option value="License">License</option>
            </select>
            <input type="date" class="form-control" id="auditDateFilter" style="width:auto;border-radius:8px;" onchange="AuditLogPage.applyFilters()" title="กรองตามวันที่">
            <button class="btn btn-outline" onclick="AuditLogPage.resetFilters()" style="border-radius:8px;"><i class="ph ph-x"></i> ล้าง</button>
          </div>
        </div>
      </div>

      <div class="card" style="box-shadow:var(--shadow);border:none;border-radius:var(--border-radius-lg);">
        <div class="table-container" style="border-radius:var(--border-radius-lg);overflow:hidden;">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="background:var(--bg-input);border-bottom:2px solid var(--border-color);">
                <th style="padding:16px;width:160px;color:var(--text-secondary);font-weight:600;">วันที่ / เวลา</th>
                <th style="padding:16px;width:150px;color:var(--text-secondary);font-weight:600;">ผู้ดำเนินการ</th>
                <th style="padding:16px;width:180px;color:var(--text-secondary);font-weight:600;">การกระทำ</th>
                <th style="padding:16px;color:var(--text-secondary);font-weight:600;">รายละเอียด (เปลี่ยนแปลง)</th>
                <th style="padding:16px;width:100px;text-align:center;color:var(--text-secondary);font-weight:600;">อ้างอิงรหัส</th>
              </tr>
            </thead>
            <tbody id="auditLogTableBody">
              <tr><td colspan="5" class="text-center text-muted" style="padding:60px;"><div class="spinner" style="margin:0 auto 16px;"></div>กำลังโหลดข้อมูล...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    `;
    },

    fetchLogs: async function () {
      App.showLoading(true);
      try {
        const data = await App.supabaseSelect('audit_log', '*', null, 'created_at.desc', 300);
        AuditLogPage.allLogs = data || [];
        AuditLogPage.renderTable(AuditLogPage.allLogs);
      } catch (err) {
        App.toast('ไม่สามารถโหลดข้อมูล Audit Log', 'error');
        console.error(err);
      } finally {
        App.showLoading(false);
      }
    },

    resetFilters: function () {
      document.getElementById('auditSearch').value = '';
      document.getElementById('auditActionFilter').value = '';
      document.getElementById('auditDateFilter').value = '';
      this.renderTable(this.allLogs);
    },

    applyFilters: function () {
      var search = document.getElementById('auditSearch').value.toLowerCase();
      var action = document.getElementById('auditActionFilter').value;
      var dateStr = document.getElementById('auditDateFilter').value;

      var filtered = this.allLogs;

      if (search) {
        filtered = filtered.filter(function (l) {
          return (l.details && l.details.toLowerCase().indexOf(search) !== -1) ||
            (l.performed_by && l.performed_by.toLowerCase().indexOf(search) !== -1) ||
            (l.action && l.action.toLowerCase().indexOf(search) !== -1);
        });
      }

      if (action) {
        filtered = filtered.filter(function (l) {
          return l.action && l.action.indexOf(action) !== -1;
        });
      }

      if (dateStr) {
        filtered = filtered.filter(function (l) { return l.created_at && l.created_at.startsWith(dateStr); });
      }

      this.renderTable(filtered);
    },

    renderTable: function (logs) {
      const tbody = document.getElementById('auditLogTableBody');
      if (!logs || logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted" style="padding:60px;">\u0e44\u0e21\u0e48\u0e1e\u0e1a\u0e1b\u0e23\u0e30\u0e27\u0e31\u0e15\u0e34\u0e01\u0e32\u0e23\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23</td></tr>';
        return;
      }

      // Sort
      logs = App.sortData(logs, this.sortColumn, this.sortDirection);

      tbody.innerHTML = logs.map(function (log) {
        // Formulate details nicely 
        let detailsHtml = log.details || '-';
        if (log.action === 'แก้ไขอุปกรณ์' && log.details.includes('→')) {
          // It's a before/after change string
          const changes = log.details.split(', ').map(change => {
            const FIELD_LABELS = {
              'name': 'ชื่ออุปกรณ์', 'asset_code': 'รหัสทรัพย์สิน', 'serial_number': 'Serial Number',
              'status': 'สถานะ', 'location': 'สถานที่', 'department_id': 'แผนก', 'category_id': 'ประเภท',
              'assigned_user': 'ชื่อผู้ใช้', 'user_position': 'ตำแหน่ง', 'assigned_email': 'อีเมล',
              'nas_user': 'User NAS', 'password': 'รหัสผ่าน NAS',
              'price': 'ราคา', 'supplier': 'ผู้จำหน่าย', 'purchase_date': 'วันที่ซื้อ',
              'warranty_expiry': 'วันหมดประกัน', 'po_number': 'เลขที่ PO',
              'model': 'รุ่น', 'cpu': 'CPU', 'ram': 'RAM', 'storage': 'Storage',
              'gpu': 'GPU', 'display': 'หน้าจอ', 'os': 'OS', 'os_key': 'OS License Key',
              'ip_address': 'IP Address', 'mac_address': 'MAC Address',
              'notes': 'หมายเหตุ', 'thumbnail_url': 'รูปภาพ'
            };
            const parts = change.split(': ');
            if (parts.length < 2) return `<span style="font-size:13px;">${change}</span>`;
            const field = parts[0].trim();
            const fieldLabel = FIELD_LABELS[field] || field;
            const vals = parts.slice(1).join(': ').split(' → ');
            return `<div style="background:var(--bg-input);padding:4px 10px;border-radius:6px;margin-bottom:4px;display:inline-block;margin-right:8px;border:1px solid var(--border-color);">
                      <span class="text-xs fw-600" style="color:var(--text-muted);">${fieldLabel}:</span>
                      <span style="color:var(--danger);text-decoration:line-through;">${vals[0] || '-'}</span>
                      <i class="ph ph-arrow-right" style="color:var(--text-muted);font-size:11px;margin:0 2px;"></i>
                      <span style="color:var(--success);">${vals[1] || '-'}</span>
                    </div>`;
          }).join('');
          detailsHtml = `<div style="display:flex;flex-wrap:wrap;">${changes}</div>`;
        }

        let actionStyle = 'background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border-color);';
        let actionIcon = 'ph-list-dashes';
        if (log.action.indexOf('\u0e40\u0e1e\u0e34\u0e48\u0e21') !== -1 || log.action.indexOf('\u0e2a\u0e23\u0e49\u0e32\u0e07') !== -1) { actionStyle = 'background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7;'; actionIcon = 'ph-plus-circle'; }
        if (log.action.indexOf('\u0e41\u0e01\u0e49\u0e44\u0e02') !== -1 || log.action.indexOf('\u0e2d\u0e31\u0e1b\u0e40\u0e14\u0e15') !== -1) { actionStyle = 'background:#FFF8E1;color:#F57F17;border:1px solid #FFE082;'; actionIcon = 'ph-pencil-simple'; }
        if (log.action.indexOf('\u0e25\u0e1a') !== -1 || log.action.indexOf('\u0e08\u0e33\u0e2b\u0e19\u0e48\u0e32\u0e22') !== -1) { actionStyle = 'background:#FFEBEE;color:#C62828;border:1px solid #EF9A9A;'; actionIcon = 'ph-trash'; }
        if (log.action.indexOf('\u0e42\u0e2d\u0e19') !== -1) { actionStyle = 'background:#E3F2FD;color:#1565C0;border:1px solid #90CAF9;'; actionIcon = 'ph-swap'; }
        if (log.action.indexOf('PM') !== -1) { actionStyle = 'background:#F3E5F5;color:#7B1FA2;border:1px solid #CE93D8;'; actionIcon = 'ph-wrench'; }
        if (log.action.indexOf('\u0e22\u0e37\u0e21') !== -1 || log.action.indexOf('\u0e04\u0e37\u0e19') !== -1) { actionStyle = 'background:#E0F2F1;color:#00695C;border:1px solid #80CBC4;'; actionIcon = 'ph-swap'; }
        if (log.action.indexOf('\u0e0b\u0e48\u0e2d\u0e21') !== -1) { actionStyle = 'background:#FFF3E0;color:#E65100;border:1px solid #FFCC80;'; actionIcon = 'ph-wrench'; }

        var dateFormatted = App.formatDateTime(log.created_at) || '';

        return '<tr style="border-bottom:1px solid var(--border-color);">' +
          '<td style="padding:16px;white-space:nowrap;">' +
          '  <div class="fw-600" style="color:var(--text-primary);">' + dateFormatted.split(',')[0] + '</div>' +
          '  <div class="text-xs text-muted"><i class="ph ph-clock"></i> ' + (dateFormatted.split(',')[1] || '').trim() + '</div>' +
          '</td>' +
          '<td style="padding:16px;">' +
          '  <div style="display:inline-flex;align-items:center;gap:6px;"><div style="width:24px;height:24px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">' + ((log.performed_by || 'U').charAt(0).toUpperCase()) + '</div> <span class="text-sm">' + (log.performed_by || 'System') + '</span></div>' +
          '</td>' +
          '<td style="padding:16px;"><span class="badge" style="padding:4px 10px;border-radius:20px;font-weight:600;' + actionStyle + '"><i class="ph ' + actionIcon + '"></i> ' + log.action + '</span></td>' +
          '<td style="padding:16px;font-size:13px;line-height:1.5;max-width:350px;">' + detailsHtml + '</td>' +
          '<td style="padding:16px;text-align:center;">' + (log.asset_id ? '<a href="javascript:void(0)" onclick="App.navigate(\'asset-detail\', {id:\'' + log.asset_id + '\'})" class="text-primary text-sm fw-500" style="text-decoration:none;"><i class="ph ph-link"></i> \u0e40\u0e1b\u0e34\u0e14\u0e14\u0e39</a>' : '<span class="text-muted text-xs">-</span>') +
          '</td></tr>';
      }).join('');
    }
  };
</script>

<script>
  /**
   * reports-warranty.html &#8212; Warranty Expiry Report Page
   */
  const WarrantyReportPage = {
    load: function () {
      const container = document.getElementById('page-reports-warranty');
      if (!container) return;
      container.innerHTML = this.getTemplate();
      this.fetchData();
    },

    getTemplate: function () {
      return `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div>
          <h2 style="font-size:22px; font-weight:700; color:var(--text-primary);">\uD83D\uDEE1\uFE0F รายงานสถานะการรับประกัน</h2>
          <p class="text-sm text-muted">ตรวจสอบอุปกรณ์ที่ใกล้หมดประกัน หรือหมดประกันแล้ว</p>
        </div>
        <button class="btn btn-primary" onclick="window.print()">\uD83D\uDDA8&#65039; พิมพ์รายงาน</button>
      </div>

      <div class="card mb-3" style="box-shadow:var(--shadow-sm);border:none;">
        <div class="card-body" style="padding:16px 20px;">
          <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:16px;">
            <div style="background:var(--bg-card); padding:16px; border-radius:12px; border:1px solid var(--border-color);">
              <div class="text-muted text-sm fw-600 mb-1">ยังอยู่ในประกัน (Active)</div>
              <div class="fw-700" style="font-size:24px; color:var(--success);" id="warActiveCount">0</div>
            </div>
            <div style="background:var(--bg-card); padding:16px; border-radius:12px; border:1px solid var(--border-color);">
              <div class="text-muted text-sm fw-600 mb-1">ใกล้หมดประกัน (<= 90 วัน)</div>
              <div class="fw-700" style="font-size:24px; color:var(--warning);" id="warExpiringCount">0</div>
            </div>
            <div style="background:var(--bg-card); padding:16px; border-radius:12px; border:1px solid var(--border-color);">
              <div class="text-muted text-sm fw-600 mb-1">หมดประกันแล้ว (Expired)</div>
              <div class="fw-700" style="font-size:24px; color:var(--danger);" id="warExpiredCount">0</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card" style="box-shadow:var(--shadow);border:none;border-radius:var(--border-radius-lg);">
        <div class="table-container" style="border-radius:var(--border-radius-lg);overflow:hidden;">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="background:var(--bg-input);border-bottom:2px solid var(--border-color);">
                <th style="padding:16px;width:120px;color:var(--text-secondary);font-weight:600;">สถานะ</th>
                <th style="padding:16px;width:120px;color:var(--text-secondary);font-weight:600;">รหัสทรัพย์สิน</th>
                <th style="padding:16px;color:var(--text-secondary);font-weight:600;">ชื่ออุปกรณ์</th>
                <th style="padding:16px;width:120px;color:var(--text-secondary);font-weight:600;">วันที่ซื้อ</th>
                <th style="padding:16px;width:120px;color:var(--text-secondary);font-weight:600;">วันหมดประกัน</th>
                <th style="padding:16px;width:120px;text-align:right;color:var(--text-secondary);font-weight:600;">จำนวนวันคงเหลือ</th>
              </tr>
            </thead>
            <tbody id="warTableBody">
              <tr><td colspan="6" class="text-center text-muted" style="padding:60px;"><div class="spinner" style="margin:0 auto 16px;"></div>กำลังเปรียบเทียบข้อมูล...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    `;
    },

    fetchData: async function () {
      try {
        const result = await App.supabaseSelect('assets', '*', 'warranty_expiry=not.is.null');
        WarrantyReportPage.analyzeAndRender(result || []);
      } catch (err) {
        App.toast('\u0e44\u0e21\u0e48\u0e2a\u0e32\u0e21\u0e32\u0e23\u0e16\u0e42\u0e2b\u0e25\u0e14\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25', 'error');
        console.error(err);
      }
    },

    analyzeAndRender: function (assets) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let activeCount = 0;
      let expiringCount = 0;
      let expiredCount = 0;

      const tbody = document.getElementById('warTableBody');
      const rows = [];

      // Filter only assets with warranty data
      const validAssets = assets.filter(a => a.warranty_expiry);

      if (validAssets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted" style="padding:60px;">ไม่มีข้อมูลอุปกรณ์ที่มีการระบุวันหมดประกัน</td></tr>';
        return;
      }

      validAssets.forEach(asset => {
        const expiryDate = new Date(asset.warranty_expiry);
        expiryDate.setHours(0, 0, 0, 0);

        // Calculate diff in days
        const diffTime = expiryDate.getTime() - today.getTime();
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        let status = 'ACTIVE';
        if (diffDays <= 0) {
          status = 'EXPIRED';
          expiredCount++;
        } else if (diffDays <= 90) {
          status = 'EXPIRING';
          expiringCount++;
        } else {
          activeCount++;
        }

        rows.push({
          status: status,
          code: asset.asset_code || '-',
          name: asset.name,
          purchase: asset.purchase_date ? App.formatDate(asset.purchase_date).split(' ')[0] : '-',
          expiry: App.formatDate(asset.warranty_expiry).split(' ')[0],
          daysLeft: diffDays
        });
      });

      // Update Summary UI
      document.getElementById('warActiveCount').innerText = activeCount;
      document.getElementById('warExpiringCount').innerText = expiringCount;
      document.getElementById('warExpiredCount').innerText = expiredCount;

      // Sort by days left (ascending - showing most urgent first)
      rows.sort((a, b) => a.daysLeft - b.daysLeft);

      // Render Table
      tbody.innerHTML = rows.map(r => {
        let statusHtml = '';
        let rowStyle = '';
        if (r.status === 'EXPIRED') {
          statusHtml = '<span class="badge" style="background:#FFEBEE;color:#C62828;">หมดประกัน</span>';
          rowStyle = 'background:#fafafa;opacity:0.8;';
        } else if (r.status === 'EXPIRING') {
          statusHtml = '<span class="badge" style="background:#FFF8E1;color:#F57F17;">ใกล้หมด (&#8804;90)</span>';
          rowStyle = 'background:#fffdf5;';
        } else {
          statusHtml = '<span class="badge" style="background:#E8F5E9;color:#2E7D32;">ในประกัน</span>';
        }

        return `
        <tr style="border-bottom:1px solid var(--border-color); ${rowStyle}">
          <td style="padding:16px;">${statusHtml}</td>
          <td style="padding:16px; font-family:monospace; font-size:13px;">${r.code}</td>
          <td style="padding:16px;" class="fw-500">${r.name}</td>

<script>
  /**
   * reports-depreciation.html &#8212; Depreciation Report Page
   */
  const DepreciationReportPage = {
    load: function () {
      const container = document.getElementById('page-reports-depreciation');
      if (!container) return;
      container.innerHTML = this.getTemplate();
      this.fetchData();
    },

    getTemplate: function () {
      return `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div>
          <h2 style="font-size:22px; font-weight:700; color:var(--text-primary);">\uD83D\uDCC9 รายงานค่าเสื่อมราคา</h2>
          <p class="text-sm text-muted">คำนวณค่าเสื่อมราคาแบบเส้นตรง (Straight-Line) อายุการใช้งาน 5 ปี</p>
        </div>
        <button class="btn btn-primary" onclick="window.print()">\uD83D\uDDA8&#65039; พิมพ์รายงาน</button>
      </div>

      <div class="card mb-3" style="box-shadow:var(--shadow-sm);border:none;">
        <div class="card-body" style="padding:16px 20px;">
          <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:16px;">
            <div style="background:var(--bg-card); padding:16px; border-radius:12px; border:1px solid var(--border-color);">
              <div class="text-muted text-sm fw-600 mb-1">มูลค่าทรัพย์สินรวม (ต้นทุน)</div>
              <div class="fw-700" style="font-size:24px; color:var(--primary-dark);" id="deprTotalCost">-</div>
            </div>
            <div style="background:var(--bg-card); padding:16px; border-radius:12px; border:1px solid var(--border-color);">
              <div class="text-muted text-sm fw-600 mb-1">ค่าเสื่อมราคาสะสมรวม</div>
              <div class="fw-700" style="font-size:24px; color:var(--danger);" id="deprTotalAccumulated">-</div>
            </div>
            <div style="background:var(--bg-card); padding:16px; border-radius:12px; border:1px solid var(--border-color);">
              <div class="text-muted text-sm fw-600 mb-1">มูลค่าสุทธิปัจจุบัน (Net Book Value)</div>
              <div class="fw-700" style="font-size:24px; color:var(--success);" id="deprTotalNet">-</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card" style="box-shadow:var(--shadow);border:none;border-radius:var(--border-radius-lg);">
        <div class="table-container" style="border-radius:var(--border-radius-lg);overflow:hidden;">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="background:var(--bg-input);border-bottom:2px solid var(--border-color);">
                <th style="padding:16px;width:120px;color:var(--text-secondary);font-weight:600;">รหัสทรัพย์สิน</th>
                <th style="padding:16px;color:var(--text-secondary);font-weight:600;">ชื่ออุปกรณ์</th>
                <th style="padding:16px;width:120px;color:var(--text-secondary);font-weight:600;">วันที่ซื้อ</th>
                <th style="padding:16px;width:120px;text-align:right;color:var(--text-secondary);font-weight:600;">ราคาทุน (฿)</th>
                <th style="padding:16px;width:120px;text-align:right;color:var(--text-secondary);font-weight:600;">ค่าเสื่อมสะสม</th>
                <th style="padding:16px;width:120px;text-align:right;color:var(--text-secondary);font-weight:600;">มูลค่าสุทธิ (NBV)</th>
              </tr>
            </thead>
            <tbody id="deprTableBody">
              <tr><td colspan="6" class="text-center text-muted" style="padding:60px;"><div class="spinner" style="margin:0 auto 16px;"></div>กำลังคำนวณและโหลดข้อมูล...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    `;
    },

    fetchData: function () {
      google.script.run
        .withSuccessHandler(function (result) {
          DepreciationReportPage.calculateAndRender(result.data || result || []);
        })
        .withFailureHandler(function () { App.toast('\u0e44\u0e21\u0e48\u0e2a\u0e32\u0e21\u0e32\u0e23\u0e16\u0e42\u0e2b\u0e25\u0e14\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25', 'error'); })
        .getAssets({ pageSize: 500 });
    },

    calculateAndRender: function (assets) {
      let totalCost = 0;
      let totalAccumulated = 0;
      let totalNet = 0;
      const today = new Date();

      const tbody = document.getElementById('deprTableBody');
      const rows = [];

      // Filter only assets with valid price and purchase date
      const validAssets = assets.filter(a => a.price > 0 && a.purchase_date);

      if (validAssets.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted" style="padding:60px;">ไม่มีข้อมูลอุปกรณ์ที่สามารถคำนวณค่าเสื่อมราคาได้ (ต้องมีราคาทุนและวันที่ซื้อ)</td></tr>';
        document.getElementById('deprTotalCost').innerText = '฿0.00';
        document.getElementById('deprTotalAccumulated').innerText = '฿0.00';
        document.getElementById('deprTotalNet').innerText = '฿0.00';
        return;
      }

      validAssets.forEach(asset => {
        const cost = parseFloat(asset.price);
        const purchaseDate = new Date(asset.purchase_date);

        // Straight line depreciation: 5 years (20% per year)
        const USEFUL_LIFE_YEARS = 5;
        const SALVAGE_VALUE = 1; // Remaining value at the end of useful life

        // Calculate months elapsed
        let monthsElapsed = (today.getFullYear() - purchaseDate.getFullYear()) * 12;
        monthsElapsed -= purchaseDate.getMonth();
        monthsElapsed += today.getMonth();

        // Cap at useful life
        const maxMonths = USEFUL_LIFE_YEARS * 12;
        const actualMonths = Math.min(Math.max(0, monthsElapsed), maxMonths);

        // Calculation
        const depreciableCost = cost - SALVAGE_VALUE;
        const monthlyDepreciation = depreciableCost / maxMonths;
        const accumulated = monthlyDepreciation * actualMonths;
        const nbv = cost - accumulated;

        totalCost += cost;
        totalAccumulated += accumulated;
        totalNet += nbv;

        rows.push({
          code: asset.asset_code || '-',
          name: asset.name,
          date: App.formatDate(asset.purchase_date).split(' ')[0],
          cost: cost,
          acc: accumulated,
          nbv: nbv,
          isFullyDepreciated: actualMonths >= maxMonths
        });
      });

      // Update Summary UI
      document.getElementById('deprTotalCost').innerText = '฿' + App.formatNumber(totalCost.toFixed(2));
      document.getElementById('deprTotalAccumulated').innerText = '฿' + App.formatNumber(totalAccumulated.toFixed(2));
      document.getElementById('deprTotalNet').innerText = '฿' + App.formatNumber(totalNet.toFixed(2));

      // Sort by Highest Cost
      rows.sort((a, b) => b.cost - a.cost);

      // Render Table
      tbody.innerHTML = rows.map(r => `
        <tr style="border-bottom:1px solid var(--border-color); ${r.isFullyDepreciated ? 'background:#f8f9fa;' : ''}">
          <td style="padding:16px; font-family:monospace; font-size:13px;">${r.code}</td>
          <td style="padding:16px;" class="fw-500">${r.name} ${r.isFullyDepreciated ? '<span class="badge" style="margin-left:8px;background:#e9ecef;color:#6c757d;font-size:10px;">หมดอายุขัย</span>' : ''}</td>
          <td style="padding:16px; font-size:13px; color:var(--text-muted);">${r.date}</td>
          <td style="padding:16px; text-align:right;">${App.formatNumber(r.cost.toFixed(2))}</td>
          <td style="padding:16px; text-align:right; color:var(--danger);">${App.formatNumber(r.acc.toFixed(2))}</td>
          <td style="padding:16px; text-align:right; font-weight:700; color:var(--success);">${App.formatNumber(r.nbv.toFixed(2))}</td>
        </tr>
      `).join('');
    }
  };
</script>

    fetchLicenses: async function () {
      App.showLoading(true);
      try {
        const result = await App.supabaseSelect('licenses', '*', null, 'name.asc');
        LicensesPage.allLicenses = result || [];
        LicensesPage.renderTable();
      } catch (err) {
        App.toast('โหลดข้อมูล License ไม่สำเร็จ', 'error');
        console.error(err);
      } finally {
        App.showLoading(false);
      }
    },

    renderTable: function () {
      const tbody = document.getElementById('licensesTableBody');
      let licenses = App.sortData(this.allLicenses, this.sortColumn, this.sortDirection);

      // Filter by search text
      const searchText = (document.getElementById('licenseSearch') || {}).value || '';
      if (searchText) {
        const q = searchText.toLowerCase();
        licenses = licenses.filter(function (l) {
          return (l.name || '').toLowerCase().indexOf(q) >= 0 ||
            (l.license_key || '').toLowerCase().indexOf(q) >= 0 ||
            (l.vendor || '').toLowerCase().indexOf(q) >= 0 ||
            (l.assigned_to || '').toLowerCase().indexOf(q) >= 0;
        });
      }

      // Filter by status
      const now = new Date();
      const thirtyDays = new Date(now.getTime() + 30 * 86400000);
      if (this.filterStatus === 'active') {
        licenses = licenses.filter(function (l) {
          return l.status === 'active' && (!l.expiry_date || new Date(l.expiry_date) > now);
        });
      } else if (this.filterStatus === 'expiring') {
        licenses = licenses.filter(function (l) {
          return l.expiry_date && new Date(l.expiry_date) > now && new Date(l.expiry_date) <= thirtyDays;
        });
      } else if (this.filterStatus === 'expired') {
        licenses = licenses.filter(function (l) {
          return l.status === 'expired' || (l.expiry_date && new Date(l.expiry_date) <= now);
        });
      }

      document.getElementById('licenseCountInfo').textContent = licenses.length + ' รายการ';

      if (licenses.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted" style="padding:40px">ไม่พบ License</td></tr>';
        return;
      }

      tbody.innerHTML = licenses.map(function (l) {
        const expiryDate = l.expiry_date ? new Date(l.expiry_date) : null;
        let statusBadge = '';
        if (l.status === 'cancelled') {
          statusBadge = '<span class="badge" style="background:#95A5A6;color:white;padding:2px 8px;border-radius:4px;font-size:11px">Cancelled</span>';
        } else if (expiryDate && expiryDate <= now) {
          statusBadge = '<span class="badge" style="background:#E74C3C;color:white;padding:2px 8px;border-radius:4px;font-size:11px">หมดอายุ</span>';
        } else if (expiryDate && expiryDate <= thirtyDays) {
          statusBadge = '<span class="badge" style="background:#F39C12;color:white;padding:2px 8px;border-radius:4px;font-size:11px">ใกล้หมดอายุ</span>';
        } else {
          statusBadge = '<span class="badge" style="background:#2ECC71;color:white;padding:2px 8px;border-radius:4px;font-size:11px">Active</span>';
        }

        const expiryStr = l.expiry_date ? new Date(l.expiry_date).toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' }) : '-';

        return '<tr>' +
          '<td><div class="fw-600">' + l.name + '</div></td>' +
          '<td>' + (l.type || '-') + '</td>' +
          '<td><span class="text-sm" style="font-family:monospace">' + (l.license_key ? l.license_key.substring(0, 20) + (l.license_key.length > 20 ? '...' : '') : '-') + '</span></td>' +
          '<td>' + (l.vendor || '-') + '</td>' +
          '<td class="text-center">' + (l.seats || '-') + '</td>' +
          '<td>' + expiryStr + '</td>' +
          '<td>' + statusBadge + '</td>' +
          '<td>' +
          '<button class="btn btn-sm btn-outline" onclick="LicensesPage.edit(\'' + l.id + '\')" title="แก้ไข">&#9999;&#65039;</button> ' +
          '<button class="btn btn-sm btn-outline" onclick="LicensesPage.remove(\'' + l.id + '\',\'' + l.name.replace(/'/g, "\\'") + '\')" title="ลบ" style="color:var(--danger)">\uD83D\uDDD1&#65039;</button>' +
          '</td></tr>';
      }).join('');
    },

    filterByStatus: function (status) {
      this.filterStatus = status;
      // Update button styles
      var btns = document.querySelectorAll('#page-licenses .toolbar .btn-group .btn');
      btns.forEach(function (b) { b.className = 'btn btn-sm btn-outline'; });
      var idx = { 'all': 0, 'active': 1, 'expiring': 2, 'expired': 3 };
      if (btns[idx[status]]) btns[idx[status]].className = 'btn btn-sm btn-primary';
      this.renderTable();
    },

    filterList: function () {
      this.renderTable();
    },

    openModal: function (license) {
      document.getElementById('editLicenseId').value = '';
      document.getElementById('licenseName').value = '';
      document.getElementById('licenseType').value = 'Software';
      document.getElementById('licenseKey').value = '';
      document.getElementById('licenseVendor').value = '';
      document.getElementById('licenseStartDate').value = '';
      document.getElementById('licenseExpiryDate').value = '';
      document.getElementById('licenseSeats').value = '';
      document.getElementById('licenseAssignedTo').value = '';
      document.getElementById('licenseStatus').value = 'active';
      document.getElementById('licenseNotes').value = '';
      document.getElementById('licenseAssetId').value = '';
      document.getElementById('licenseModalTitle').textContent = '&#10133; เพิ่ม License';

      // Load assets for linking
      (async function () {
        try {
          const result = await App.supabaseSelect('assets', 'id,name,asset_code', null, 'name.asc', 500);
          var sel = document.getElementById('licenseAssetId');
          sel.innerHTML = '<option value="">-- \u0e44\u0e21\u0e48\u0e23\u0e30\u0e1a\u0e38 --</option>';
          (result || []).forEach(function (a) {
            sel.innerHTML += '<option value="' + a.id + '">' + a.name + ' (' + (a.asset_code || '') + ')</option>';
          });
          App.initSearchableSelect('licenseAssetId', result || [], '-- \u0e04\u0e49\u0e19\u0e2b\u0e32\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c\u0e17\u0e35\u0e48\u0e40\u0e0a\u0e37\u0e48\u0e2d\u0e21\u0e42\u0e22\u0e07 --', license ? license.asset_id : null);
        } catch (err) {
          console.error('Error loading assets for license modal:', err);
        }
      })();

      if (license) {
        document.getElementById('editLicenseId').value = license.id;
        document.getElementById('licenseName').value = license.name || '';
        document.getElementById('licenseType').value = license.type || 'Software';
        document.getElementById('licenseKey').value = license.license_key || '';
        document.getElementById('licenseVendor').value = license.vendor || '';
        document.getElementById('licenseStartDate').value = license.start_date ? license.start_date.substring(0, 10) : '';
        document.getElementById('licenseExpiryDate').value = license.expiry_date ? license.expiry_date.substring(0, 10) : '';
        document.getElementById('licenseSeats').value = license.seats || '';
        document.getElementById('licenseAssignedTo').value = license.assigned_to || '';
        document.getElementById('licenseStatus').value = license.status || 'active';
        document.getElementById('licenseNotes').value = license.notes || '';
        document.getElementById('licenseModalTitle').textContent = '&#9999;&#65039; แก้ไข License';
      }

      openModal('licenseModal');
    },

    edit: function (id) {
      var license = this.allLicenses.find(function (l) { return l.id === id; });
      if (license) this.openModal(license);
    },

    save: function () {
      var name = document.getElementById('licenseName').value.trim();
      if (!name) {
        App.toast('กรุณากรอกชื่อ License', 'warning');
        return;
      }

      var data = {
        name: name,
        type: document.getElementById('licenseType').value,
        license_key: document.getElementById('licenseKey').value.trim(),
        vendor: document.getElementById('licenseVendor').value.trim(),
        start_date: document.getElementById('licenseStartDate').value || null,
        expiry_date: document.getElementById('licenseExpiryDate').value || null,
        seats: parseInt(document.getElementById('licenseSeats').value) || null,
        assigned_to: document.getElementById('licenseAssignedTo').value.trim(),
        status: document.getElementById('licenseStatus').value,
        notes: document.getElementById('licenseNotes').value.trim(),
        asset_id: document.getElementById('licenseAssetId').value || null
      };

      var editId = document.getElementById('editLicenseId').value;
      App.showLoading(true);

      if (editId) {
        google.script.run
          .withSuccessHandler(function () {
            App.showLoading(false);
            closeModal('licenseModal');
            App.toast('อัปเดต License เรียบร้อย', 'success');
            LicensesPage.fetchLicenses();
          })
          .withFailureHandler(function () { App.showLoading(false); App.toast('เกิดข้อผิดพลาด', 'error'); })
          .updateLicense(editId, data);
      } else {
        google.script.run
          .withSuccessHandler(function () {
            App.showLoading(false);
            closeModal('licenseModal');
            App.toast('เพิ่ม License เรียบร้อย', 'success');
            LicensesPage.fetchLicenses();
          })
          .withFailureHandler(function () { App.showLoading(false); App.toast('เกิดข้อผิดพลาด', 'error'); })
          .createLicense(data);
      }
    },

    remove: function (id, name) {
      showConfirm('ต้องการลบ License "' + name + '"?', function () {
        App.showLoading(true);
        google.script.run
          .withSuccessHandler(function () {
            App.showLoading(false);
            App.toast('ลบ License เรียบร้อย', 'success');
            LicensesPage.fetchLicenses();
          })
          .withFailureHandler(function () { App.showLoading(false); App.toast('เกิดข้อผิดพลาด', 'error'); })
          .deleteLicense(id);
      });
    }
  };
</script>

        '<div class="stat-card"><div class="stat-icon blue">\uD83D\uDD27</div><div><div class="stat-value" id="pmTotal">-</div><div class="stat-label">PM \u0e17\u0e31\u0e49\u0e07\u0e2b\u0e21\u0e14</div></div></div>' +
        '<div class="stat-card"><div class="stat-icon orange">\u26A0\uFE0F</div><div><div class="stat-value" id="pmDue">-</div><div class="stat-label">\u0e16\u0e36\u0e07\u0e01\u0e33\u0e2b\u0e19\u0e14 / \u0e40\u0e25\u0e22\u0e01\u0e33\u0e2b\u0e19\u0e14</div></div></div>' +
        '<div class="stat-card"><div class="stat-icon green">\u2705</div><div><div class="stat-value" id="pmCompleted">-</div><div class="stat-label">\u0e17\u0e33\u0e40\u0e2a\u0e23\u0e47\u0e08\u0e41\u0e25\u0e49\u0e27</div></div></div>' +
        '</div>' +
        '<div class="card">' +
        '<div class="card-header"><h3>\uD83D\uDD27 \u0e15\u0e32\u0e23\u0e32\u0e07\u0e1a\u0e33\u0e23\u0e38\u0e07\u0e23\u0e31\u0e01\u0e29\u0e32</h3><div style="display:flex;gap:8px"><select class="form-control" style="width:auto" onchange="MaintenancePage.filterStatus=this.value;MaintenancePage.renderTable()"><option value="">\u0e17\u0e31\u0e49\u0e07\u0e2b\u0e21\u0e14</option><option value="pending">\u0e23\u0e2d\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23</option><option value="overdue">\u0e40\u0e25\u0e22\u0e01\u0e33\u0e2b\u0e19\u0e14</option></select><button class="btn btn-primary btn-sm" onclick="MaintenancePage.openModal()">\u2795 \u0e2a\u0e23\u0e49\u0e32\u0e07 PM</button></div></div>' +
        '<div class="table-container"><table><thead><tr><th>\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c</th><th>\u0e23\u0e32\u0e22\u0e01\u0e32\u0e23 PM</th><th>\u0e04\u0e27\u0e32\u0e21\u0e16\u0e35\u0e48</th><th>\u0e17\u0e33\u0e25\u0e48\u0e32\u0e2a\u0e38\u0e14</th><th>\u0e04\u0e23\u0e31\u0e49\u0e07\u0e16\u0e31\u0e14\u0e44\u0e1b</th><th>\u0e2a\u0e16\u0e32\u0e19\u0e30</th><th>\u0e08\u0e31\u0e14\u0e01\u0e32\u0e23</th></tr></thead><tbody id="pmTableBody"><tr><td colspan="7" class="text-center text-muted" style="padding:40px"><div class="spinner" style="margin:0 auto 12px"></div>\u0e01\u0e33\u0e25\u0e31\u0e07\u0e42\u0e2b\u0e25\u0e14...</td></tr></tbody></table></div></div>' +
        '<div class="modal-overlay" id="pmModal"><div class="modal"><div class="modal-header"><h3 id="pmModalTitle">\u0e2a\u0e23\u0e49\u0e32\u0e07 PM \u0e43\u0e2b\u0e21\u0e48</h3><button class="modal-close" onclick="closeModal(\'pmModal\')">&times;</button></div>' +
        '<div class="modal-body"><input type="hidden" id="pmEditId">' +
        '<div class="form-group"><label>\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c *</label><select class="form-control" id="pmAssetId"><option value="">-- \u0e40\u0e25\u0e37\u0e2d\u0e01 --</option></select></div>' +
        '<div class="form-group"><label>\u0e0a\u0e37\u0e48\u0e2d\u0e07\u0e32\u0e19 PM *</label><input type="text" class="form-control" id="pmTitle" placeholder="\u0e40\u0e0a\u0e48\u0e19 \u0e17\u0e33\u0e04\u0e27\u0e32\u0e21\u0e2a\u0e30\u0e2d\u0e32\u0e14\u0e1b\u0e23\u0e30\u0e08\u0e33\u0e1b\u0e35"></div>' +
        '<div class="form-group"><label>\u0e23\u0e32\u0e22\u0e25\u0e30\u0e40\u0e2d\u0e35\u0e22\u0e14</label><textarea class="form-control" id="pmDescription" rows="2"></textarea></div>' +
        '<div class="form-row"><div class="form-group"><label>\u0e04\u0e27\u0e32\u0e21\u0e16\u0e35\u0e48</label><select class="form-control" id="pmFrequency" onchange="document.getElementById(\'pmCustomDays\').style.display=this.value===\'custom\'?\'block\':\'none\'"><option value="daily">\u0e17\u0e38\u0e01\u0e27\u0e31\u0e19</option><option value="weekly">\u0e17\u0e38\u0e01\u0e2a\u0e31\u0e1b\u0e14\u0e32\u0e2b\u0e4c</option><option value="monthly" selected>\u0e17\u0e38\u0e01\u0e40\u0e14\u0e37\u0e2d\u0e19</option><option value="quarterly">\u0e17\u0e38\u0e01 3 \u0e40\u0e14\u0e37\u0e2d\u0e19</option><option value="yearly">\u0e17\u0e38\u0e01\u0e1b\u0e35</option><option value="custom">\u0e01\u0e33\u0e2b\u0e19\u0e14\u0e40\u0e2d\u0e07</option></select><input type="number" class="form-control" id="pmCustomDays" placeholder="\u0e08\u0e33\u0e19\u0e27\u0e19\u0e27\u0e31\u0e19" style="display:none;margin-top:8px"></div>' +
        '<div class="form-group"><label>\u0e01\u0e33\u0e2b\u0e19\u0e14\u0e16\u0e31\u0e14\u0e44\u0e1b</label><input type="date" class="form-control" id="pmNextDue"></div></div>' +
        '<div class="form-group"><label>\u0e1c\u0e39\u0e49\u0e23\u0e31\u0e1a\u0e1c\u0e34\u0e14\u0e0a\u0e2d\u0e1a</label><input type="text" class="form-control" id="pmAssignedTo" placeholder="\u0e0a\u0e37\u0e48\u0e2d\u0e1c\u0e39\u0e49\u0e23\u0e31\u0e1a\u0e1c\u0e34\u0e14\u0e0a\u0e2d\u0e1a"></div></div>' +
        '<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal(\'pmModal\')">&times; \u0e22\u0e01\u0e40\u0e25\u0e34\u0e01</button><button class="btn btn-primary" onclick="MaintenancePage.save()">\u0e1a\u0e31\u0e19\u0e17\u0e36\u0e01</button></div></div></div>';
    },

    fetchItems: async function () {
      App.showLoading(true);
      try {
        const data = await App.supabaseSelect('maintenance_schedules', '*, assets(name)', null, 'next_due_at.asc');
        MaintenancePage.allItems = data || [];
        MaintenancePage.renderStats();
        MaintenancePage.renderTable();
      } catch (err) {
        App.toast('\u0e42\u0e2b\u0e25\u0e14\u0e44\u0e21\u0e48\u0e2a\u0e33\u0e40\u0e23\u0e47\u0e08: ' + err.message, 'error');
        console.error(err);
      } finally {
        App.showLoading(false);
      }
    },

    renderStats: function () {
      var now = new Date();
      var total = this.allItems.length;
      var due = this.allItems.filter(function (m) { return m.status === 'pending' && new Date(m.next_due_at) <= now; }).length;
      var completed = this.allItems.filter(function (m) { return m.last_performed_at; }).length;
      document.getElementById('pmTotal').textContent = total;
      document.getElementById('pmDue').textContent = due;
      document.getElementById('pmCompleted').textContent = completed;
    },

    renderTable: function () {
      var tbody = document.getElementById('pmTableBody');
      var now = new Date();
      var filtered = this.filterStatus ? this.allItems.filter(function (m) {
        if (MaintenancePage.filterStatus === 'overdue') return m.status === 'pending' && new Date(m.next_due_at) <= now;
        return m.status === MaintenancePage.filterStatus;
      }) : this.allItems.slice();
      var items = App.sortData(filtered, this.sortColumn, this.sortDirection);

      if (!items || items.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted" style="padding:40px">\u0e44\u0e21\u0e48\u0e21\u0e35\u0e23\u0e32\u0e22\u0e01\u0e32\u0e23 PM</td></tr>'; return; }

      var freqMap = { daily: '\u0e17\u0e38\u0e01\u0e27\u0e31\u0e19', weekly: '\u0e17\u0e38\u0e01\u0e2a\u0e31\u0e1b\u0e14\u0e32\u0e2b\u0e4c', monthly: '\u0e17\u0e38\u0e01\u0e40\u0e14\u0e37\u0e2d\u0e19', quarterly: '\u0e17\u0e38\u0e01 3 \u0e40\u0e14\u0e37\u0e2d\u0e19', yearly: '\u0e17\u0e38\u0e01\u0e1b\u0e35', custom: '\u0e01\u0e33\u0e2b\u0e19\u0e14\u0e40\u0e2d\u0e07' };
      tbody.innerHTML = items.map(function (m) {
        var nextDue = new Date(m.next_due_at);
        var isOverdue = m.status === 'pending' && nextDue <= now;
        var isDueSoon = m.status === 'pending' && !isOverdue && nextDue <= new Date(now.getTime() + 7 * 86400000);
        var badgeCls = isOverdue ? 'overdue' : isDueSoon ? 'due-soon' : m.status === 'completed' ? 'completed' : 'pending';
        var badgeText = isOverdue ? '\u0e40\u0e25\u0e22\u0e01\u0e33\u0e2b\u0e19\u0e14' : isDueSoon ? '\u0e43\u0e01\u0e25\u0e49\u0e01\u0e33\u0e2b\u0e19\u0e14' : m.status === 'pending' ? '\u0e23\u0e2d\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23' : m.status;
        var assetName = m.assets ? m.assets.name : '-';
        return '<tr>' +
          '<td class="fw-600">' + assetName + '</td>' +
          '<td>' + m.title + '</td>' +
          '<td>' + (freqMap[m.frequency] || m.frequency) + '</td>' +
          '<td>' + (m.last_performed_at ? App.formatDate(m.last_performed_at) : '-') + '</td>' +
          '<td>' + App.formatDate(m.next_due_at) + '</td>' +
          '<td><span class="pm-badge ' + badgeCls + '">' + badgeText + '</span></td>' +
          '<td><div style="display:flex;gap:4px">' +
          (m.status === 'pending' ? '<button class="btn btn-sm btn-success" onclick="MaintenancePage.complete(\'' + m.id + '\')" title="\u0e17\u0e33\u0e40\u0e2a\u0e23\u0e47\u0e08"><i class="ph ph-check"></i></button>' : '') +
          '<button class="btn btn-sm btn-outline" onclick="MaintenancePage.edit(\'' + m.id + '\')" title="\u0e41\u0e01\u0e49\u0e44\u0e02"><i class="ph ph-pencil-simple"></i></button>' +
          '<button class="btn btn-sm btn-outline" style="color:var(--danger)" onclick="MaintenancePage.remove(\'' + m.id + '\',\'' + m.title.replace(/'/g, "\\'") + '\')" title="\u0e25\u0e1a"><i class="ph ph-trash"></i></button>' +
          '</div></td></tr>';
      }).join('');
    },

    openModal: async function (pm) {
      document.getElementById('pmEditId').value = pm ? pm.id : '';
      document.getElementById('pmTitle').value = pm ? pm.title : '';
      document.getElementById('pmDescription').value = pm ? (pm.description || '') : '';
      document.getElementById('pmFrequency').value = pm ? pm.frequency : 'monthly';
      document.getElementById('pmCustomDays').value = pm ? pm.interval_days : '';
      document.getElementById('pmCustomDays').style.display = (pm && pm.frequency === 'custom') ? 'block' : 'none';
      document.getElementById('pmNextDue').value = pm ? (pm.next_due_at || '').slice(0, 10) : '';
      document.getElementById('pmAssignedTo').value = pm ? (pm.assigned_to || '') : '';
      document.getElementById('pmModalTitle').textContent = pm ? '\u0e41\u0e01\u0e49\u0e44\u0e02 PM' : '\u0e2a\u0e23\u0e49\u0e32\u0e07 PM \u0e43\u0e2b\u0e21\u0e48';
      // populate asset select
      var sel = document.getElementById('pmAssetId');
      sel.innerHTML = '<option value="">-- \u0e01\u0e33\u0e25\u0e31\u0e07\u0e42\u0e2b\u0e25\u0e14... --</option>';
      openModal('pmModal');

      try {
        const assets = await App.supabaseSelect('assets', 'id,name,asset_code', null, 'name.asc', 200);
        sel.innerHTML = '<option value="">-- \u0e40\u0e25\u0e37\u0e2d\u0e01 --</option>';
        (assets || []).forEach(function (a) {
          sel.innerHTML += '<option value="' + a.id + '"' + (pm && pm.asset_id === a.id ? ' selected' : '') + '>' + a.name + ' (' + (a.asset_code || '') + ')</option>';
        });
        App.initSearchableSelect('pmAssetId', assets || [], null, pm ? pm.asset_id : null);
      } catch (err) {
        sel.innerHTML = '<option value="">-- \u0e42\u0e2b\u0e25\u0e14\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25\u0e44\u0e21\u0e48\u0e2a\u0e33\u0e40\u0e23\u0e47\u0e08 --</option>';
      }
    },

    edit: function (id) {
      var pm = this.allItems.find(function (m) { return m.id === id; });
      if (pm) this.openModal(pm);
    },

    save: function () {
      var assetId = document.getElementById('pmAssetId').value;
      var title = document.getElementById('pmTitle').value.trim();
      if (!assetId || !title) { App.toast('\u0e01\u0e23\u0e38\u0e13\u0e32\u0e40\u0e25\u0e37\u0e2d\u0e01\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c\u0e41\u0e25\u0e30\u0e23\u0e30\u0e1a\u0e38\u0e0a\u0e37\u0e48\u0e2d\u0e07\u0e32\u0e19', 'warning'); return; }
      var data = {
        asset_id: assetId,
        title: title,
        description: document.getElementById('pmDescription').value.trim(),
        frequency: document.getElementById('pmFrequency').value,
        interval_days: parseInt(document.getElementById('pmCustomDays').value) || 30,
        next_due_at: document.getElementById('pmNextDue').value ? new Date(document.getElementById('pmNextDue').value).toISOString() : null,
        assigned_to: document.getElementById('pmAssignedTo').value.trim() || null
      };
      var editId = document.getElementById('pmEditId').value;
      App.showLoading(true);
      if (editId) {
        google.script.run.withSuccessHandler(function () { App.showLoading(false); closeModal('pmModal'); App.toast('\u0e2d\u0e31\u0e1b\u0e40\u0e14\u0e15 PM \u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22', 'success'); MaintenancePage.fetchItems(); })
          .withFailureHandler(function (err) { App.showLoading(false); App.toast(err.message, 'error'); }).updateMaintenance(editId, data);
      } else {
        google.script.run.withSuccessHandler(function () { App.showLoading(false); closeModal('pmModal'); App.toast('\u0e2a\u0e23\u0e49\u0e32\u0e07 PM \u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22', 'success'); MaintenancePage.fetchItems(); })
          .withFailureHandler(function (err) { App.showLoading(false); App.toast(err.message, 'error'); }).createMaintenance(data);
      }
    },

    complete: function (id) {
      showConfirm('\u0e22\u0e37\u0e19\u0e22\u0e31\u0e19\u0e27\u0e48\u0e32\u0e14\u0e33\u0e40\u0e19\u0e34\u0e19\u0e01\u0e32\u0e23 PM \u0e40\u0e2a\u0e23\u0e47\u0e08\u0e41\u0e25\u0e49\u0e27?', function () {
        App.showLoading(true);
        google.script.run.withSuccessHandler(function () { App.showLoading(false); App.toast('PM \u0e40\u0e2a\u0e23\u0e47\u0e08\u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22', 'success'); MaintenancePage.fetchItems(); })
          .withFailureHandler(function (err) { App.showLoading(false); App.toast(err.message, 'error'); }).completeMaintenance(id);
      });
    },

    remove: function (id, name) {
      showConfirm('\u0e15\u0e49\u0e2d\u0e07\u0e01\u0e32\u0e23\u0e25\u0e1a "' + name + '"?', function () {
        App.showLoading(true);
        google.script.run.withSuccessHandler(function () { App.showLoading(false); App.toast('\u0e25\u0e1a PM \u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22', 'success'); MaintenancePage.fetchItems(); })
          .withFailureHandler(function (err) { App.showLoading(false); App.toast(err.message, 'error'); }).deleteMaintenance(id);
      });
    }
  };
</script>
<script>
  // ================================================================
  //  CHECKOUT PAGE — Asset Check-in / Check-out
  // ================================================================
  var CheckoutPage = {
    allItems: [],
    filterStatus: '',
    sortColumn: 'checkout_date',
    sortDirection: 'desc',

    load: function () {
      var container = document.getElementById('page-checkouts');
      container.innerHTML = this.getTemplate();
      App.makeTHSortable('page-checkouts', 'CheckoutPage', [
        { col: 'asset_id' }, { col: 'checked_out_to' }, { col: 'department' }, { col: 'checkout_date' }, { col: 'expected_return_date' }, { col: 'status' }, null
      ]);
      this.fetchItems();
    },

    sortBy: function (column) {
      if (this.sortColumn === column) {
        this.sortDirection = this.sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        this.sortColumn = column;
        this.sortDirection = 'asc';
      }
      App.updateSortIcons('CheckoutPage', ['asset_id', 'checked_out_to', 'department', 'checkout_date', 'expected_return_date', 'status'], this.sortColumn, this.sortDirection);
      this.renderTable();
    },

    getTemplate: function () {
      return '<div class="stats-grid">' +
        '<div class="stat-card"><div class="stat-icon orange">\uD83D\uDCE4</div><div><div class="stat-value" id="coOut">-</div><div class="stat-label">\u0e22\u0e37\u0e21\u0e2d\u0e2d\u0e01\u0e2d\u0e22\u0e39\u0e48</div></div></div>' +
        '<div class="stat-card"><div class="stat-icon red">\u26A0\uFE0F</div><div><div class="stat-value" id="coOverdue">-</div><div class="stat-label">\u0e04\u0e49\u0e32\u0e07\u0e04\u0e37\u0e19</div></div></div>' +
        '<div class="stat-card"><div class="stat-icon green">\u2705</div><div><div class="stat-value" id="coReturned">-</div><div class="stat-label">\u0e04\u0e37\u0e19\u0e41\u0e25\u0e49\u0e27</div></div></div>' +
        '<div class="stat-card"><div class="stat-icon blue">\uD83D\uDCCB</div><div><div class="stat-value" id="coTotal">-</div><div class="stat-label">\u0e17\u0e31\u0e49\u0e07\u0e2b\u0e21\u0e14</div></div></div>' +
        '</div>' +
        '<div class="card">' +
        '<div class="card-header"><h3>\uD83D\uDD04 \u0e23\u0e32\u0e22\u0e01\u0e32\u0e23\u0e22\u0e37\u0e21-\u0e04\u0e37\u0e19</h3><div style="display:flex;gap:8px"><select class="form-control" style="width:auto" onchange="CheckoutPage.filterStatus=this.value;CheckoutPage.renderTable()"><option value="">\u0e17\u0e31\u0e49\u0e07\u0e2b\u0e21\u0e14</option><option value="checked_out">\u0e22\u0e37\u0e21\u0e2d\u0e2d\u0e01</option><option value="returned">\u0e04\u0e37\u0e19\u0e41\u0e25\u0e49\u0e27</option><option value="overdue">\u0e04\u0e49\u0e32\u0e07\u0e04\u0e37\u0e19</option></select><button class="btn btn-primary btn-sm" onclick="CheckoutPage.openModal()">\u2795 \u0e22\u0e37\u0e21\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c</button></div></div>' +
        '<div class="table-container"><table><thead><tr><th>\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c</th><th>\u0e1c\u0e39\u0e49\u0e22\u0e37\u0e21</th><th>\u0e2b\u0e19\u0e48\u0e27\u0e22\u0e07\u0e32\u0e19</th><th>\u0e27\u0e31\u0e19\u0e22\u0e37\u0e21</th><th>\u0e01\u0e33\u0e2b\u0e19\u0e14\u0e04\u0e37\u0e19</th><th>\u0e2a\u0e16\u0e32\u0e19\u0e30</th><th>\u0e08\u0e31\u0e14\u0e01\u0e32\u0e23</th></tr></thead><tbody id="coTableBody"><tr><td colspan="7" class="text-center text-muted" style="padding:40px"><div class="spinner" style="margin:0 auto 12px"></div>\u0e01\u0e33\u0e25\u0e31\u0e07\u0e42\u0e2b\u0e25\u0e14...</td></tr></tbody></table></div></div>' +
        '<div class="modal-overlay" id="coModal"><div class="modal"><div class="modal-header"><h3>\u0e22\u0e37\u0e21\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c</h3><button class="modal-close" onclick="closeModal(\'coModal\')">&times;</button></div>' +
        '<div class="modal-body">' +
        '<div class="form-group"><label>\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c *</label><select class="form-control" id="coAssetId"><option value="">-- \u0e40\u0e25\u0e37\u0e2d\u0e01 --</option></select></div>' +
        '<div class="form-group"><label>\u0e1c\u0e39\u0e49\u0e22\u0e37\u0e21 *</label><input type="text" class="form-control" id="coName" placeholder="\u0e0a\u0e37\u0e48\u0e2d\u0e1c\u0e39\u0e49\u0e22\u0e37\u0e21"></div>' +
        '<div class="form-row"><div class="form-group"><label>\u0e2b\u0e19\u0e48\u0e27\u0e22\u0e07\u0e32\u0e19</label><input type="text" class="form-control" id="coDepartment" placeholder="\u0e2b\u0e19\u0e48\u0e27\u0e22\u0e07\u0e32\u0e19\u0e1c\u0e39\u0e49\u0e22\u0e37\u0e21"></div>' +
        '<div class="form-group"><label>\u0e01\u0e33\u0e2b\u0e19\u0e14\u0e04\u0e37\u0e19</label><input type="date" class="form-control" id="coReturnDate"></div></div>' +
        '<div class="form-group"><label>\u0e2b\u0e21\u0e32\u0e22\u0e40\u0e2b\u0e15\u0e38</label><textarea class="form-control" id="coNotes" rows="2"></textarea></div></div>' +
        '<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal(\'coModal\')">&times; \u0e22\u0e01\u0e40\u0e25\u0e34\u0e01</button><button class="btn btn-primary" onclick="CheckoutPage.save()">\u0e22\u0e37\u0e19\u0e22\u0e31\u0e19\u0e22\u0e37\u0e21</button></div></div></div>';
    },

    fetchItems: async function () {
      App.showLoading(true);
      try {
        const data = await App.supabaseSelect('asset_checkouts', '*, assets(name)', null, 'checkout_date.desc');
        CheckoutPage.allItems = data || [];
        CheckoutPage.renderStats();
        CheckoutPage.renderTable();
      } catch (err) {
        App.toast('\u0e42\u0e2b\u0e25\u0e14\u0e44\u0e21\u0e48\u0e2a\u0e33\u0e40\u0e23\u0e47\u0e08: ' + err.message, 'error');
        console.error(err);
      } finally {
        App.showLoading(false);
      }
    },

    renderStats: function () {
      var now = new Date();
      var out = 0, overdue = 0, returned = 0;
      this.allItems.forEach(function (c) {
        if (c.status === 'checked_out') {
          out++;
          if (c.expected_return_date && new Date(c.expected_return_date) < now) overdue++;
        }
        if (c.status === 'returned') returned++;
      });
      document.getElementById('coOut').textContent = out;
      document.getElementById('coOverdue').textContent = overdue;
      document.getElementById('coReturned').textContent = returned;
      document.getElementById('coTotal').textContent = this.allItems.length;
    },

    renderTable: function () {
      var tbody = document.getElementById('coTableBody');
      var now = new Date();
      var items = this.filterStatus ? this.allItems.filter(function (c) {
        if (CheckoutPage.filterStatus === 'overdue') return c.status === 'checked_out' && c.expected_return_date && new Date(c.expected_return_date) < now;
        return c.status === CheckoutPage.filterStatus;
      }) : this.allItems.slice();

      // Sort
      items = App.sortData(items, this.sortColumn, this.sortDirection);

      if (!items || items.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted" style="padding:40px">\u0e44\u0e21\u0e48\u0e21\u0e35\u0e23\u0e32\u0e22\u0e01\u0e32\u0e23</td></tr>'; return; }

      var statusMap = { checked_out: '\u0e22\u0e37\u0e21\u0e2d\u0e2d\u0e01', returned: '\u0e04\u0e37\u0e19\u0e41\u0e25\u0e49\u0e27', overdue: '\u0e04\u0e49\u0e32\u0e07\u0e04\u0e37\u0e19' };
      tbody.innerHTML = items.map(function (c) {
        var assetName = c.assets ? c.assets.name : '-';
        var isOverdue = c.status === 'checked_out' && c.expected_return_date && new Date(c.expected_return_date) < now;
        var st = isOverdue ? 'overdue' : c.status;
        return '<tr>' +
          '<td class="fw-600">' + assetName + '</td>' +
          '<td>' + c.checked_out_to + '</td>' +
          '<td>' + (c.department || '-') + '</td>' +
          '<td>' + App.formatDate(c.checkout_date) + '</td>' +
          '<td>' + (c.expected_return_date ? App.formatDate(c.expected_return_date) : '-') + '</td>' +
          '<td><span class="co-badge ' + st + '">' + (statusMap[st] || st) + '</span></td>' +
          '<td>' + (c.status === 'checked_out' ? '<button class="btn btn-sm btn-success" onclick="CheckoutPage.checkin(\'' + c.id + '\')" title="\u0e04\u0e37\u0e19"><i class="ph ph-arrow-u-down-left"></i> \u0e04\u0e37\u0e19</button>' : '<span class="text-muted text-sm">' + (c.actual_return_date ? App.formatDate(c.actual_return_date) : '-') + '</span>') +
          '</td></tr>';
      }).join('');
    },

    openModal: async function () {
      document.getElementById('coName').value = '';
      document.getElementById('coDepartment').value = '';
      document.getElementById('coReturnDate').value = '';
      document.getElementById('coNotes').value = '';
      var sel = document.getElementById('coAssetId');
      sel.innerHTML = '<option value="">-- กำลังโหลด... --</option>';
      openModal('coModal');

      try {
        const assets = await App.supabaseSelect('assets', 'id,name,asset_code,status', 'or=(status.eq.ใช้งาน,status.eq.สำรอง)', 'name.asc', 200);
        sel.innerHTML = '<option value="">-- \u0e40\u0e25\u0e37\u0e2d\u0e01 --</option>';
        (assets || []).forEach(function (a) {
          sel.innerHTML += '<option value="' + a.id + '">' + a.name + ' (' + (a.asset_code || '') + ')</option>';
        });
        App.initSearchableSelect('coAssetId', assets || []);
      } catch (err) {
        sel.innerHTML = '<option value="">-- \u0e42\u0e2b\u0e25\u0e14\u0e02\u0e49\u0e2d\u0e21\u0e39\u0e25\u0e44\u0e21\u0e48\u0e2a\u0e33\u0e40\u0e23\u0e47\u0e08 --</option>';
      }
    },

    save: function () {
      var assetId = document.getElementById('coAssetId').value;
      var name = document.getElementById('coName').value.trim();
      if (!assetId || !name) { App.toast('\u0e01\u0e23\u0e38\u0e13\u0e32\u0e40\u0e25\u0e37\u0e2d\u0e01\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c\u0e41\u0e25\u0e30\u0e23\u0e30\u0e1a\u0e38\u0e1c\u0e39\u0e49\u0e22\u0e37\u0e21', 'warning'); return; }
      var assetOption = document.getElementById('coAssetId').selectedOptions[0];
      var data = {
        asset_id: assetId,
        asset_name: assetOption ? assetOption.textContent : '',
        checked_out_to: name,
        department: document.getElementById('coDepartment').value.trim() || null,
        expected_return_date: document.getElementById('coReturnDate').value || null,
        notes: document.getElementById('coNotes').value.trim() || null
      };
      App.showLoading(true);
      google.script.run
        .withSuccessHandler(function () { App.showLoading(false); closeModal('coModal'); App.toast('\u0e22\u0e37\u0e21\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c\u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22', 'success'); CheckoutPage.fetchItems(); })
        .withFailureHandler(function (err) { App.showLoading(false); App.toast(err.message, 'error'); })
        .checkoutAsset(data);
    },

    checkin: function (id) {
      showConfirm('\u0e22\u0e37\u0e19\u0e22\u0e31\u0e19\u0e01\u0e32\u0e23\u0e04\u0e37\u0e19\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c?', function () {
        App.showLoading(true);
        google.script.run
          .withSuccessHandler(function () { App.showLoading(false); App.toast('\u0e04\u0e37\u0e19\u0e2d\u0e38\u0e1b\u0e01\u0e23\u0e13\u0e4c\u0e40\u0e23\u0e35\u0e22\u0e1a\u0e23\u0e49\u0e2d\u0e22', 'success'); CheckoutPage.fetchItems(); })
          .withFailureHandler(function (err) { App.showLoading(false); App.toast(err.message, 'error'); })
          .checkinAsset(id);
      });
    }
  };
</script>
